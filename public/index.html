<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>演唱会行程一键生成器</title>
  <style>
    /* ====== 全局变量 ====== */
    :root {
      --primary: #7C3AED;
      --primary-light: #A78BFA;
      --accent: #EC4899;
      --accent-light: #F9A8D4;
      --bg-gradient: linear-gradient(180deg, #f0eef5 0%, #f8f9fa 30%, #ffffff 100%);
      --theme-tint: #f0eef5;
      --card-bg: #ffffff;
      --text-main: #1a1a2e;
      --text-sub: #6b7280;
      --text-light: #9ca3af;
      --border: #e5e7eb;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 30px rgba(124,58,237,0.15);
    }

    /* ====== Reset ====== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ====== 顶部标题 ====== */
    .header {
      text-align: center;
      padding: 32px 20px 20px;
      color: var(--text-main);
      transition: color 0.5s ease;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background 0.5s ease;
    }
    .header .subtitle {
      font-size: 14px;
      color: var(--text-sub);
      margin-top: 8px;
    }
    .header .sparkle {
      display: inline-block;
      animation: sparkle 1.5s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.2) rotate(15deg); opacity: 0.8; }
    }

    /* ====== 主容器 ====== */
    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ====== 桌面三列布局 ====== */
    .desktop-layout {
      display: grid;
      grid-template-columns: 400px 1fr 320px;
      gap: 20px;
      align-items: start;
    }
    .left-panel {
      position: sticky;
      top: 20px;
    }
    /* 右栏随页面滚动（不固定），地图在上、留言板紧随其下 */
    .right-sidebar {
      min-width: 0;
    }
    @media (max-width: 1200px) {
      .desktop-layout { grid-template-columns: 380px 1fr; gap: 20px; }
      .right-sidebar { grid-column: 1 / -1; }
    }
    @media (max-width: 860px) {
      .desktop-layout { grid-template-columns: 1fr; gap: 16px; }
      .left-panel { position: static; }
      .container { max-width: 480px; padding: 0 16px; }
    }

    /* ====== 卡片通用样式 ====== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* ====== 定位卡片 ====== */
    .location-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
    }
    .location-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .location-info { flex: 1; min-width: 0; }
    .location-label { font-size: 13px; color: var(--text-light); }
    .location-value {
      font-size: 17px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .location-value.loading { color: var(--text-light); font-weight: 400; }
    .location-refresh {
      background: none; border: none; color: var(--primary);
      font-size: 13px; cursor: pointer; padding: 6px 10px;
      border-radius: 8px; transition: background 0.2s;
    }
    .location-refresh:active { background: #f3f4f6; }

    /* ====== 表单 ====== */
    .form-section { margin-bottom: 16px; padding: 24px; }
    .form-section h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 14px; font-weight: 600;
      color: var(--text-sub); margin-bottom: 8px;
    }
    .form-group label .required { color: var(--accent); }
    .input-hint {
      font-size: 12px; color: #9ca3af; margin-top: 6px; padding: 0 2px;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 14px 16px;
      border: 2px solid var(--border); border-radius: 12px;
      font-size: 16px; transition: border-color 0.2s;
      background: #f9fafb;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--primary-light);
      background: #fff;
    }
    .form-group input::placeholder { color: var(--text-light); }

    /* 日期选择器样式优化 */
    .form-group input[type="date"] {
      color: var(--text-main);
    }

    /* ====== 自定义应援设置 ====== */
    .custom-theme-section {
      margin-top: 14px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .custom-theme-section.has-custom {
      border-color: var(--primary);
      border-style: solid;
    }
    .custom-theme-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 600;
      color: var(--text-sub); user-select: none;
      transition: background 0.2s;
    }
    .custom-theme-toggle:hover { background: var(--theme-tint, #f5f3ff); }
    .custom-theme-toggle .toggle-label { display: flex; align-items: center; gap: 6px; }
    .custom-theme-toggle .toggle-arrow {
      font-size: 12px; transition: transform 0.3s;
    }
    .custom-theme-section.open .toggle-arrow { transform: rotate(180deg); }
    .custom-theme-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .custom-theme-section.open .custom-theme-body {
      max-height: 500px;
    }
    .custom-theme-inner { padding: 4px 16px 16px; }
    .custom-theme-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .custom-theme-row label {
      font-size: 13px; font-weight: 600; color: var(--text-sub);
      min-width: 70px; flex-shrink: 0;
    }
    .custom-color-picker {
      width: 44px; height: 44px; border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer; padding: 2px;
      background: none; flex-shrink: 0;
    }
    .custom-color-picker::-webkit-color-swatch-wrapper { padding: 0; }
    .custom-color-picker::-webkit-color-swatch { border: none; border-radius: 8px; }
    .custom-color-picker::-moz-color-swatch { border: none; border-radius: 8px; }
    .custom-color-hex {
      flex: 1; padding: 10px 12px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 14px; font-family: monospace;
      background: #f9fafb; text-transform: uppercase;
    }
    .custom-color-hex:focus { outline: none; border-color: var(--primary-light); background: #fff; }
    .custom-text-input {
      flex: 1; padding: 10px 12px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 14px; background: #f9fafb;
    }
    .custom-text-input:focus { outline: none; border-color: var(--primary-light); background: #fff; }
    .custom-text-input::placeholder { color: var(--text-light); }
    .custom-reset-btn {
      width: 100%; padding: 10px; margin-top: 4px;
      border: 2px solid var(--border); border-radius: 10px;
      background: #fff; color: var(--text-sub); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .custom-reset-btn:hover { border-color: var(--primary); color: var(--primary); }
    .custom-theme-badge {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 10px; background: var(--primary); color: #fff;
      margin-left: 6px;
    }

    /* ====== 主按钮 ====== */
    .btn-generate {
      width: 100%; padding: 18px;
      border: none; border-radius: 14px;
      font-size: 18px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 15px rgba(124,58,237,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-generate:active { transform: scale(0.97); }
    .btn-generate:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none;
    }

    /* ====== 加载动画 ====== */
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(4px);
    }
    .loading-overlay.show { display: flex; }
    .loading-box {
      background: #fff; border-radius: 20px; padding: 30px 40px;
      text-align: center; max-width: 320px;
    }
    .loading-spinner {
      width: 50px; height: 50px;
      border: 4px solid #f3f4f6;
      border-top-color: var(--primary);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 600; color: var(--text-main); }
    .loading-subtext { font-size: 13px; color: var(--text-light); margin-top: 6px; }

    /* ====== 结果区域 ====== */
    .results-section { display: none; }
    .results-section.show { display: block; }

    /* Tab 切换 */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
      background: #fff; padding: 6px; border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .tab-btn {
      flex: 1; padding: 10px 8px;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      background: transparent; color: var(--text-sub);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 结果卡片 */
    .result-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px;
      transition: box-shadow 0.2s, transform 0.15s;
      animation: fadeInUp 0.4s ease-out;
    }
    .result-card:active { transform: scale(0.98); }
    .result-card.selected {
      border: 2px solid var(--primary);
      box-shadow: 0 4px 20px rgba(124,58,237,0.2);
      background: linear-gradient(135deg, rgba(124,58,237,0.03), rgba(236,72,153,0.03));
    }
    .result-card .select-row {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px;
    }
    .select-btn {
      padding: 6px 18px; border: 2px solid var(--primary); border-radius: 20px;
      background: transparent; color: var(--primary); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .select-btn:hover { background: var(--primary); color: #fff; }
    .select-btn.selected {
      background: var(--primary); color: #fff;
      border-color: var(--primary);
    }
    .select-btn.selected::before { content: '✓ '; }
    .buy-btn {
      padding: 6px 18px; border: none; border-radius: 20px;
      background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .buy-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
    .summary-row .value.muted { color: var(--text-light); font-size: 13px; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 机票/高铁卡片 */
    .transport-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .transport-route {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700;
    }
    .transport-route .arrow { color: var(--primary); font-size: 18px; }
    .transport-price {
      font-size: 20px; font-weight: 800; color: var(--accent);
    }
    .transport-price .unit { font-size: 12px; font-weight: 400; color: var(--text-light); }
    .transport-detail {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 13px; color: var(--text-sub);
    }
    .transport-detail span { display: flex; align-items: center; gap: 4px; }
    .transport-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; margin-left: 6px;
    }
    .badge-cheap { background: #fef3c7; color: #92400e; }
    .badge-direct { background: #d1fae5; color: #065f46; }
    .badge-fast { background: #dbeafe; color: #1e40af; }
    .badge-warn { background: #fee2e2; color: #b91c1c; }

    /* 酒店卡片 */
    .hotel-card { display: flex; gap: 12px; }
    .hotel-img {
      width: 90px; height: 90px; border-radius: 12px;
      flex-shrink: 0; object-fit: cover; background: #f3f4f6;
    }
    .hotel-img-placeholder {
      width: 90px; height: 90px; border-radius: 12px;
      flex-shrink: 0; background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .hotel-info { flex: 1; min-width: 0; }
    .hotel-name {
      font-size: 15px; font-weight: 700; margin-bottom: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hotel-meta {
      font-size: 12px; color: var(--text-light); margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .hotel-star {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      background: #fef3c7; color: #92400e;
    }
    .hotel-score {
      color: var(--warning); font-weight: 700; font-size: 13px;
    }
    .hotel-features {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .hotel-feature {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: #f3f4f6; color: var(--text-sub);
    }
    .hotel-price-row {
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .hotel-price { font-size: 18px; font-weight: 800; color: var(--accent); }
    .hotel-price .unit { font-size: 11px; font-weight: 400; color: var(--text-light); }
    .hotel-distance { font-size: 12px; color: var(--primary); font-weight: 600; }

    /* 酒店筛选工具栏 */
    .hotel-filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      background: #faf9ff; border: 1px solid var(--border, #eee);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 12px;
      font-size: 12px;
    }
    .hotel-filter-bar .label { color: var(--text-sub, #6b7280); font-weight: 600; }
    .hotel-filter-bar input[type="number"] {
      width: 64px; padding: 4px 6px; border: 1px solid #e5e7eb;
      border-radius: 6px; font-size: 12px; outline: none;
    }
    .hotel-filter-bar input[type="number"]:focus { border-color: var(--primary, #7c3aed); }
    .hotel-filter-bar select {
      padding: 4px 6px; border: 1px solid #e5e7eb; border-radius: 6px;
      font-size: 12px; background: white; cursor: pointer; outline: none;
    }
    .hotel-filter-bar .filter-btn {
      padding: 4px 12px; border: none; border-radius: 6px;
      background: linear-gradient(135deg, var(--primary, #7c3aed), var(--accent, #ec4899));
      color: white; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .hotel-filter-bar .reset-btn {
      padding: 4px 10px; border: 1px solid #e5e7eb; border-radius: 6px;
      background: white; color: var(--text-sub, #6b7280); font-size: 12px; cursor: pointer;
    }
    .hotel-filter-info { font-size: 12px; color: var(--text-sub, #6b7280); margin-left: auto; }

    /* 回到顶部浮动按钮 */
    .scroll-top-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 48px; height: 48px; border-radius: 50%;
      background: white; border: 1.5px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      font-size: 20px; cursor: pointer; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .scroll-top-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.16);
      border-color: var(--primary);
    }

    /* 空状态 */
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--text-light);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state .text { font-size: 15px; }

    /* 错误提示 */
    .error-banner {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .error-banner .icon { font-size: 20px; flex-shrink: 0; }
    .error-banner .content { flex: 1; font-size: 13px; color: #991b1b; }
    .error-banner .retry {
      background: var(--error); color: #fff; border: none;
      padding: 6px 14px; border-radius: 8px; font-size: 12px;
      cursor: pointer; margin-top: 8px;
    }

    /* 行程总结 */
    .summary-card {
      background: linear-gradient(135deg, #f5f3ff, #fdf2f8);
      border: 1px solid #e9d5ff;
    }
    .summary-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f3e8ff;
      font-size: 14px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .icon { font-size: 18px; }
    .summary-row .label { color: var(--text-sub); min-width: 70px; }
    .summary-row .value { font-weight: 600; }

    /* 底部提示 */
    .footer-tip {
      text-align: center; color: var(--text-light);
      font-size: 12px; padding: 20px;
    }

    /* 分享按钮 */
    .share-bar {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .share-btn {
      flex: 1; padding: 14px; border: 2px solid var(--primary);
      background: #fff; color: var(--primary); border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .share-btn:active { transform: scale(0.97); }
    .share-btn-accent {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border-color: transparent;
    }

    /* 分享弹窗 */
    .share-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .share-modal.show { display: flex; }
    .share-modal-content {
      background: #fff; border-radius: 20px; padding: 20px;
      max-width: 360px; width: 100%; max-height: 85vh; overflow-y: auto;
      text-align: center;
    }
    .share-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; font-size: 15px; font-weight: 600; color: var(--text-main);
    }
    .share-modal-close {
      background: #f3f4f6; border: none; width: 28px; height: 28px;
      border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-sub);
    }
    .share-modal-body img {
      width: 100%; border-radius: 12px; border: 1px solid var(--border);
    }
    .share-download-btn {
      margin-top: 14px; width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .share-download-btn:active { transform: scale(0.97); }

    /* 复制成功提示 */
    .copy-toast {
      position: fixed; bottom: 30%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px;
      border-radius: 24px; font-size: 14px; z-index: 2000;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .copy-toast.show { opacity: 1; }

    /* POI 搜索建议 */
    .suggestions {
      position: relative;
    }
    .suggestion-list {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 2px solid var(--border);
      border-top: none; border-radius: 0 0 12px 12px;
      max-height: 200px; overflow-y: auto; z-index: 10;
      display: none;
    }
    .suggestion-list.show { display: block; }
    .suggestion-item {
      padding: 10px 14px; font-size: 14px; cursor: pointer;
      border-bottom: 1px solid #f3f4f6; transition: background 0.15s;
    }
    .suggestion-item:active, .suggestion-item:hover { background: #f9fafb; }
    .suggestion-item .name { font-weight: 600; }
    .suggestion-item .addr { font-size: 12px; color: var(--text-light); margin-top: 2px; }

    /* ====== 主题切换过渡 ====== */
    body, .btn-generate, .tab-btn.active, .location-icon,
    .share-btn-accent, .share-download-btn, .theme-banner, .loading-spinner {
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
    }

    /* ====== 应援主题横幅 ====== */
    .theme-banner {
      display: none;
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease-out;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .theme-banner.show { display: block; }
    .theme-banner .slogan {
      font-size: 22px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
      letter-spacing: 2px;
      position: relative; z-index: 2;
    }
    .theme-banner .fan-name {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 8px;
      position: relative; z-index: 2;
    }
    .theme-banner .banner-deco {
      position: absolute; opacity: 0.15; z-index: 1;
    }

    /* ====== 地图区域 ====== */
    .map-section {
      display: none;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .map-section.show { display: block; animation: fadeInUp 0.5s ease-out; }
    .map-section .map-title {
      font-size: 15px; font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .map-canvas-wrapper {
      width: 100%; position: relative;
    }
    .map-canvas-wrapper canvas {
      width: 100%; height: auto; display: block;
    }
    .map-legend {
      font-size: 12px; color: var(--text-light);
      text-align: center; margin-top: 8px;
    }
    /* ====== Leaflet 地图 ====== */
    .leaflet-container { border-radius: 12px; z-index: 1; }
    #leafletMap { width: 100%; height: 180px; border-radius: 12px; overflow: hidden; }
    .city-marker {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .leaflet-popup-content-wrapper { border-radius: 12px; }
    .leaflet-popup-content { margin: 12px 16px; font-size: 13px; line-height: 1.6; }
    .popup-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .popup-row { display: flex; gap: 4px; margin-top: 4px; }

    /* ====== 城市特色卡片 ====== */
    .city-highlights {
      margin-top: 12px; display: none;
    }
    .city-highlights.show { display: block; animation: fadeInUp 0.4s ease-out; }
    .city-highlights h4 {
      font-size: 13px; font-weight: 700; color: var(--text-sub);
      margin-bottom: 8px; display: flex; align-items: center; gap: 4px;
    }
    .highlights-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .highlight-card {
      background: var(--card-bg); border-radius: 10px; padding: 10px 12px;
      border: 1px solid var(--border); transition: border-color 0.3s;
    }
    .highlight-card .hl-icon { font-size: 20px; margin-bottom: 4px; }
    .highlight-card .hl-label { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
    .highlight-card .hl-value { font-size: 12px; color: var(--text-main); font-weight: 500; }

    /* ====== 主题柔化：顶部色带 ====== */
    .theme-accent-bar {
      height: 4px; width: 100%; position: fixed; top: 0; left: 0; z-index: 999;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      transition: background 0.5s ease;
    }
    @keyframes shimmer {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }
    .card.themed-card {
      border-left: 3px solid var(--primary);
      transition: border-color 0.5s ease;
    }

    /* ====== 空状态占位 ====== */
    .empty-placeholder { display: none; }

    /* ====== 下单弹窗 ====== */
    .order-modal {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .order-modal-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
    }
    .order-modal-content {
      position: relative; width: 92%; max-width: 420px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      overflow: hidden; animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .order-modal-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .order-modal-title { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .order-modal-subtitle { font-size: 12px; color: var(--text-light); }
    .order-modal-close {
      position: absolute; top: 12px; right: 14px;
      width: 28px; height: 28px; border: none; border-radius: 50%;
      background: #f5f5f5; color: var(--text-light);
      font-size: 18px; cursor: pointer;
    }
    .order-modal-body { padding: 16px 20px; }
    .order-form-group { margin-bottom: 14px; }
    .order-form-label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; }
    .order-form-label .required { color: var(--danger); margin-left: 2px; }
    .order-form-input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; outline: none; box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .order-form-input:focus { border-color: var(--primary); }
    .order-modal-footer {
      display: flex; gap: 10px; padding: 12px 20px 18px;
    }
    .order-btn-secondary, .order-btn-primary {
      flex: 1; padding: 10px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
    }
    .order-btn-secondary { background: #f5f5f5; color: var(--text-sub); }
    .order-btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }
    .order-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ====== 演唱会资讯滚动栏 ====== */
    .concert-ticker {
      margin-bottom: 16px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .concert-ticker-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 6px;
      font-size: 13px; font-weight: 700;
      color: #fff;
    }
    .concert-ticker-header .ticker-icon {
      font-size: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .concert-ticker-header .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff4757;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .concert-ticker-header .ticker-title { letter-spacing: 0.5px; }
    .concert-ticker-header .ticker-hint {
      margin-left: auto;
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,0.5);
    }
    .concert-ticker-body {
      padding: 0 16px 10px;
      position: relative;
      min-height: 38px;
    }
    .concert-ticker-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s, opacity 0.4s ease;
      position: absolute; top: 0; left: 16px; right: 16px;
    }
    .concert-ticker-item:hover {
      background: rgba(255,255,255,0.08);
    }
    .concert-ticker-item .ci-tag {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      flex-shrink: 0;
    }
    .ci-tag.tag-fire { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
    .ci-tag.tag-hot { background: #ffa502; color: #fff; }
    .ci-tag.tag-soon { background: #2ed573; color: #fff; }
    .ci-tag.tag-pre { background: #70a1ff; color: #fff; }
    .concert-ticker-item .ci-artist {
      font-size: 13px; font-weight: 600; color: #fff;
      white-space: nowrap;
    }
    .concert-ticker-item .ci-tour {
      font-size: 12px; color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    .concert-ticker-item .ci-venue {
      font-size: 12px; color: rgba(255,255,255,0.5);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .concert-ticker-item .ci-date {
      font-size: 12px; font-weight: 600; color: #ffd700;
      flex-shrink: 0; margin-left: auto;
    }
    .concert-ticker-item .ci-city {
      font-size: 11px; color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }
    .concert-ticker-item .ci-fav {
      font-size: 16px; cursor: pointer; flex-shrink: 0;
      color: rgba(255,255,255,0.5); transition: all 0.2s;
      margin-left: 4px; line-height: 1;
    }
    .concert-ticker-item .ci-fav:hover { transform: scale(1.25); color: #ff6b6b; }
    .concert-ticker-item .ci-fav.is-fav { color: #ff4757; }
    .concert-ticker-loading {
      padding: 10px 14px;
      font-size: 12px; color: rgba(255,255,255,0.4);
    }

    /* ====== 留言板 ====== */
    .msg-board {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .msg-board-header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-board-header .msg-count {
      background: rgba(255,255,255,0.25);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: auto;
    }
    .msg-board-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      max-height: 460px;
    }
    .msg-board-body::-webkit-scrollbar { width: 4px; }
    .msg-board-body::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }
    .msg-item {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .msg-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .msg-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      color: #fff; font-weight: 700;
    }
    .msg-author {
      font-size: 13px; font-weight: 600; color: var(--text-main);
    }
    .msg-time {
      font-size: 10px; color: var(--text-light);
      margin-left: auto;
    }
    .msg-content {
      font-size: 13px; color: var(--text-main);
      line-height: 1.5; margin-bottom: 6px;
      word-break: break-word; overflow-wrap: break-word;
    }
    .msg-sticker {
      font-size: 24px; margin-bottom: 6px;
      word-break: break-word; overflow-wrap: break-word;
    }
    .msg-image {
      max-width: 100%; max-height: 200px;
      border-radius: 8px; margin-bottom: 6px;
      cursor: pointer; display: block;
    }
    .msg-actions {
      display: flex; gap: 14px;
      font-size: 11px; color: var(--text-light);
    }
    .msg-action {
      cursor: pointer; transition: color 0.2s;
      display: flex; align-items: center; gap: 3px;
      user-select: none;
    }
    .msg-action:hover { color: var(--primary); }
    .msg-action.liked { color: var(--accent); }
    .msg-replies {
      margin-top: 8px; padding-left: 38px;
    }
    .msg-reply {
      margin-bottom: 6px; padding: 6px 10px;
      background: #f8f8fa; border-radius: 8px;
      font-size: 12px;
    }
    .msg-reply .reply-author {
      font-weight: 600; color: var(--text-sub); margin-right: 4px;
    }
    .msg-reply-input {
      margin-top: 6px; padding-left: 38px;
      display: none;
    }
    .msg-reply-input.show { display: flex; gap: 6px; }
    .msg-reply-input input {
      flex: 1; border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 10px;
      font-size: 12px; outline: none;
    }
    .msg-reply-input input:focus { border-color: var(--primary); }
    .msg-reply-input button {
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: 4px 12px; font-size: 11px;
      cursor: pointer; white-space: nowrap;
    }
    .msg-board-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: #fafafa;
    }
    .msg-input-area {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .msg-input-area textarea {
      flex: 1; resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px; outline: none;
      font-family: inherit;
      min-height: 38px; max-height: 100px;
      transition: border-color 0.2s;
    }
    .msg-input-area textarea:focus { border-color: var(--primary); }
    .msg-input-tools {
      display: flex; gap: 6px;
    }
    .msg-tool-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff; cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .msg-tool-btn:hover { border-color: var(--primary); background: #f5f0ff; }
    .msg-send-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border: none;
      border-radius: 8px;
      padding: 0 14px; height: 38px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: transform 0.15s;
    }
    .msg-send-btn:active { transform: scale(0.95); }
    .msg-img-preview {
      position: relative; margin-bottom: 6px;
    }
    .msg-img-preview img {
      max-width: 120px; max-height: 120px;
      border-radius: 8px; display: block;
    }
    .msg-img-preview .remove-img {
      position: absolute; top: -6px; right: -6px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,0.6); color: #fff;
      border: none; border-radius: 50%;
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-empty {
      text-align: center; padding: 30px 0;
      color: var(--text-light); font-size: 13px;
    }
    .msg-empty .emoji { font-size: 36px; margin-bottom: 8px; }

    /* ====== 留言标签筛选 ====== */
    .msg-tags-filter {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .msg-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .msg-tag:hover { border-color: var(--primary); color: var(--primary); }
    .msg-tag.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; border-color: transparent;
    }
    .msg-item-tags {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-bottom: 6px;
    }
    .msg-item-tag {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      background: rgba(124,58,237,0.08);
      color: var(--primary);
    }

    /* ====== 留言分页 ====== */
    .msg-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: #fafafa;
    }
    .msg-page-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .msg-page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .msg-page-btn:disabled {
      opacity: 0.4; cursor: not-allowed;
      border-color: var(--border); color: var(--text-light);
    }
    .msg-page-info {
      font-size: 12px; color: var(--text-sub);
    }

    /* ====== 发布标签选择 ====== */
    .msg-post-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .msg-post-tag-label {
      font-size: 11px; color: var(--text-light);
    }
    .msg-post-tag {
      font-size: 11px;
      color: var(--text-sub);
      cursor: pointer;
      display: flex; align-items: center; gap: 3px;
    }
    .msg-post-tag input { cursor: pointer; }

    /* ====== 打车卡片 ====== */
.taxi-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: linear-gradient(135deg, #fff7ed, #fef3c7);
  border: 1px solid #fed7aa;
  border-radius: var(--radius);
  margin-bottom: 12px;
  transition: all 0.2s;
}
.taxi-card:hover { box-shadow: 0 4px 16px rgba(251,146,60,0.15); }
.taxi-card.selected {
  border-color: var(--primary);
  background: linear-gradient(135deg, rgba(124,58,237,0.05), rgba(236,72,153,0.05));
}
.taxi-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.taxi-info { flex: 1; min-width: 0; }
.taxi-type-name { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
.taxi-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-sub);
}
.taxi-meta span { display: flex; align-items: center; gap: 4px; }
.taxi-price-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.taxi-price { font-size: 22px; font-weight: 800; color: var(--accent); }
.taxi-price .unit { font-size: 12px; font-weight: 400; color: var(--text-light); }
.taxi-estimate { font-size: 12px; color: var(--text-light); }
.taxi-supplier { font-size: 11px; color: var(--primary); font-weight: 600; }

/* 打车独立面板 */
.taxi-panel {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.taxi-panel-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.taxi-input-group {
  margin-bottom: 14px;
}
.taxi-input-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.taxi-input-row {
  display: flex;
  gap: 8px;
}
.taxi-input-row input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.taxi-input-row input:focus { border-color: var(--primary); }
.taxi-locate-btn {
  padding: 10px 14px;
  background: #f0eef5;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.taxi-locate-btn:hover { background: var(--primary); }
.taxi-locate-btn.loading { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.taxi-swap-btn {
  display: block;
  margin: 0 auto 14px;
  padding: 6px 16px;
  background: #f0eef5;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.taxi-swap-btn:hover { background: var(--primary); }

.taxi-search-btn {
  width: 100%;

<script>
// ====== 状态管理 ======
const state = {
  userCity: '',
  userLongitude: '',
  userLatitude: '',
  venueInfo: null,       // {name, city, latitude, longitude, adcode, address}
  hotelSearchLocation: null, // 酒店搜索位置（澳门演出时为珠海位置）{destination, adcode, latitude, longitude}
  departureAirportCode: '',
  arrivalAirportCode: '',
  arrivalCity: '',
  concertDate: '',
  results: { flights: [], trains: [], buses: [], taxis: [], hotels: [] },
  selected: { flight: null, train: null, bus: null, taxi: null, hotel: null }, // 拟选择
  hotelFilter: { minPrice: 50, maxPrice: null, sortBy: 'rating' }, // 酒店筛选：默认过滤50元以下，综合推荐排序
  hotelsMeta: { total: 0, loaded: 0, radius: 5000, hasMore: false }, // 酒店分页元数据
  suggestTimer: null,
  customTheme: { color: null, fanName: null, slogan: null }, // 自定义应援覆盖
  taxi: { fromName: '', fromLat: '', fromLng: '', fromAdcode: '', toName: '', toLat: '', toLng: '', toAdcode: '', timeMode: 'now', customTime: '' },
  noFeasibleTransport: false, // 是否无可行交通方案
};

// ====== 工具函数 ======
function $(id) { return document.getElementById(id); }

function showLoading(text, subtext) {
  $('loadingText').textContent = text || '正在生成行程方案...';
  $('loadingSubtext').textContent = subtext || '可能需要 10-15 秒';
  $('loadingOverlay').classList.add('show');
}
function hideLoading() {
  $('loadingOverlay').classList.remove('show');
}

function showError(msg, showRetry) {
  const area = $('errorArea');
  area.innerHTML = `
    <div class="error-banner">
      <div class="icon">😅</div>
      <div class="content">
        ${msg}
        ${showRetry ? '<br><button class="retry" onclick="generateItinerary()">重试</button>' : ''}
      </div>
    </div>`;
}
function clearError() { $('errorArea').innerHTML = ''; }

function clearItinerary() {
  state.results = { flights: [], trains: [], buses: [], taxis: [], hotels: [] };
  state.selected = { flight: null, train: null, bus: null, taxi: null, hotel: null };
  state.autoRecommended = false;
  state.venueInfo = null;
  state.hotelSearchLocation = null;
  state.hotelsMeta = { total: 0, loaded: 0, radius: 5000, hasMore: false };
  state.noFeasibleTransport = false;

  $('tab-flights').innerHTML = '';
  $('tab-trains').innerHTML = '';
  $('tab-buses').innerHTML = '';
  $('tab-taxis').innerHTML = '';
  $('tab-hotels').innerHTML = '';

  $('summaryCard').innerHTML = `
    <div style="font-size:16px;font-weight:700;margin-bottom:12px;">📋 行程概览</div>
    <div class="empty-state" style="padding:20px 0;">
      <div class="emoji">🎫</div>
      <div class="text">请先输入演出信息并生成行程</div>
    </div>`;

  const mapEl = $('fansMap');
  if (mapEl) mapEl.innerHTML = '<div class="map-placeholder"><div class="emoji">🗺️</div><div>生成行程后显示应援地图</div></div>';

  $('resultsSection').classList.remove('show');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function getNextDate(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 1);
  return d.toISOString().split('T')[0];
}

function addDaysToDateMD(dateStr, days) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  d.setDate(d.getDate() + (days || 0));
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

// 给日期字符串加天数，返回 YYYY-MM-DD（字符串运算，避免时区问题）
function addDaysToDateISO(dateStr, days) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  d.setDate(d.getDate() + (days || 0));
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// 计算航班到达比出发晚几天（基于 dep_time / arr_time 的完整日期）
// 航班红眼航班跨零点时，arr_time 日期会大于 dep_time 日期
function getFlightArriveDays(f) {
  const depMatch = (f.dep_time || '').match(/(\d{4}-\d{1,2}-\d{1,2})/);
  const arrMatch = (f.arr_time || '').match(/(\d{4}-\d{1,2}-\d{1,2})/);
  if (!depMatch || !arrMatch) return 0;
  const dep = new Date(depMatch[1] + 'T00:00:00');
  const arr = new Date(arrMatch[1] + 'T00:00:00');
  if (isNaN(dep.getTime()) || isNaN(arr.getTime())) return 0;
  return Math.round((arr.getTime() - dep.getTime()) / 86400000);
}

// 提取时间部分（"2026-07-16 08:30:00" → "08:30:00"，"08:30" → "08:30"）
function getTimePart(timeStr) {
  if (!timeStr) return '';
  if (timeStr.includes(' ')) return timeStr.split(' ')[1];
  return timeStr;
}

// 判断是否在演唱会当天17点前到达
// 航班 arr_time 为完整 datetime（如 "2026-09-27 00:30"），可直接判断跨天；
// 高铁/巴士 arr_time 仅为时间（如 "00:30"），需结合 arrive_days 推算到达日期。
// 用 ISO 字符串字典序比较，规避时区问题。
function isArriveBefore5pm(arrTimeStr, arriveDays) {
  if (!arrTimeStr || !state.concertDate) return false;

  let arrivalISO;
  if (/\d{4}-\d{1,2}-\d{1,2}\s+\d{1,2}:\d{2}/.test(arrTimeStr)) {
    arrivalISO = arrTimeStr;
  } else {
    const timePart = getTimePart(arrTimeStr);
    const match = timePart.match(/(\d{1,2}):(\d{2})/);
    if (!match) return false;
    const days = arriveDays ? parseInt(arriveDays) : 0;
    const arrDate = addDaysToDateISO(state.concertDate, days);
    if (!arrDate) return false;
    arrivalISO = `${arrDate} ${match[1].padStart(2, '0')}:${match[2]}`;
  }

  const deadline = `${state.concertDate} 17:00`;
  return arrivalISO < deadline;
}

function isTransportFeasible(item, type) {
  if (!state.concertDate) return true;

  let arrivalISO;
  let depTimeStr;

  if (type === 'flight') {
    if (!item.dep_time || !item.arr_time) return false;
    depTimeStr = item.dep_time;
    arrivalISO = item.arr_time;
  } else if (type === 'train' || type === 'bus') {
    const timePart = getTimePart(item.arrive_time || '');
    const match = timePart.match(/(\d{1,2}):(\d{2})/);
    if (!match) return false;
    depTimeStr = item.dep_time;
    const days = parseInt(item.arrive_days || '0');
    const arrDate = addDaysToDateISO(state.concertDate, days);
    if (!arrDate) return false;
    arrivalISO = `${arrDate} ${match[1].padStart(2, '0')}:${match[2]}`;
  } else if (type === 'taxi') {
    return true;
  } else {
    return true;
  }

  const now = new Date();
  const concertDate = new Date(state.concertDate.replace(/-/g, '/'));
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const isTodayShow = concertDate.getTime() === today.getTime();

  if (isTodayShow) {
    const depDate = new Date(depTimeStr.replace(/-/g, '/'));
    if (depDate <= now) {
      return false;
    }

    const arrDeadline = new Date(`${state.concertDate.replace(/-/g, '/')} 18:00:00`);
    const arrDate = new Date(arrivalISO.replace(/-/g, '/'));
    if (arrDate > arrDeadline) {
      return false;
    }
  }

  const arrDeadline = new Date(`${state.concertDate.replace(/-/g, '/')} 23:59:59`);
  const arrDate = new Date(arrivalISO.replace(/-/g, '/'));
  return arrDate <= arrDeadline;
}

// 检查航班舱位是否有余票
function cabinHasTickets(cabin) {
  const fields = ['left_tickets', 'remain_tickets', 'left_seats', 'remain_seats', 'seat_count', 'available_seats'];
  for (const f of fields) {
    if (cabin[f] !== undefined && cabin[f] !== null) return cabin[f] > 0;
  }
  return true; // 无余票字段时默认有票
}

// 机票排序：17点前到达优先，再按价格
function getSortedFlights() {
  return state.results.flights
    .map(f => {
      const availCabins = (f.cabins || []).filter(c => cabinHasTickets(c));
      const minPrice = availCabins.length > 0
        ? Math.min(...availCabins.map(c => c.adult_price || c.lowest_price || Infinity))
        : Infinity;
      return { ...f, _minPrice: minPrice, _availCabins: availCabins, _before5pm: isArriveBefore5pm(f.arr_time, 0) };
    })
    .filter(f => f._availCabins.length > 0)
    .sort((a, b) => {
      if (a._before5pm !== b._before5pm) return a._before5pm ? -1 : 1;
      return a._minPrice - b._minPrice;
    });
}

// 高铁排序：17点前到达优先，再按价格；过滤余票为0
function getSortedTrains() {
  return state.results.trains
    .map(t => {
      const availSeats = (t.seats || []).filter(s => s.left_tickets === undefined || s.left_tickets === null || s.left_tickets > 0);
      const minPrice = availSeats.length > 0
        ? Math.min(...availSeats.map(s => s.price || Infinity))
        : Infinity;
      return { ...t, _minPrice: minPrice, _availSeats: availSeats, _before5pm: isArriveBefore5pm(t.arr_time, t.arrive_days) };
    })
    .filter(t => t._availSeats.length > 0)
    .sort((a, b) => {
      if (a._before5pm !== b._before5pm) return a._before5pm ? -1 : 1;
      return a._minPrice - b._minPrice;
    });
}

// 巴士排序：17点前到达优先，再按价格；过滤余票为0
function getSortedBuses() {
  return state.results.buses
    .map(b => {
      const availSeats = (b.seats || []).filter(s => s.left_tickets === undefined || s.left_tickets === null || s.left_tickets > 0);
      const minPrice = availSeats.length > 0
        ? Math.min(...availSeats.map(s => s.price || Infinity))
        : Infinity;
      return { ...b, _minPrice: minPrice, _availSeats: availSeats, _before5pm: isArriveBefore5pm(b.arr_time, b.arrive_days) };
    })
    .filter(b => b._availSeats.length > 0)
    .sort((a, b) => {
      if (a._before5pm !== b._before5pm) return a._before5pm ? -1 : 1;
      return a._minPrice - b._minPrice;
    });
}

function generateBusList(depCity, arrCity, date, distance, duration, isGeneric) {
  const busTypes = [
    { type: '豪华大巴', typeCode: 'luxury', priceBase: 80 + Math.floor(distance / 10) },
    { type: '普通大巴', typeCode: 'standard', priceBase: 50 + Math.floor(distance / 12) },
    { type: '商务中巴', typeCode: 'business', priceBase: 120 + Math.floor(distance / 8) },
  ];

  const schedules = [
    { dep: '07:30', arr: null },
    { dep: '09:00', arr: null },
    { dep: '11:00', arr: null },
    { dep: '13:30', arr: null },
    { dep: '15:00', arr: null },
  ];

  const durHours = parseFloat(duration) || 3;
  const buses = schedules.slice(0, isGeneric ? 3 : 5).map((sched, idx) => {
    const [h, m] = sched.dep.split(':').map(Number);
    const totalMin = h * 60 + m + durHours * 60;
    const arrH = Math.floor(totalMin / 60) % 24;
    const arrM = Math.floor(totalMin % 60);
    const arrTime = `${String(arrH).padStart(2, '0')}:${String(arrM).padStart(2, '0')}`;
    const arriveDays = totalMin >= 1440 ? 1 : 0;

    const busType = busTypes[idx % busTypes.length];
    const priceVariation = Math.floor(Math.random() * 20) - 10;
    const price = Math.max(35, busType.priceBase + priceVariation);
    const leftTickets = Math.floor(Math.random() * 30) + 5;

    return {
      bus_code: `K${1000 + idx + Math.floor(Math.random() * 9000)}`,
      from_station: depCity + '客运站',
      to_station: arrCity + '客运站',
      dep_time: sched.dep,
      arr_time: arrTime,
      arrive_days: String(arriveDays),
      duration: duration,
      bus_type: busType.typeCode,
      bus_type_name: busType.type,
      distance: distance,
      seats: [
        { seat_type_name: busType.type, price: price, left_tickets: leftTickets },
      ],
    };
  });

  return buses;
}

// ====== API 调用 ======
async function apiGet(path, params) {
  const qs = new URLSearchParams(params).toString();
  const url = path + (qs ? '?' + qs : '');
  try {
    // 自动添加 token（如果存在）
    const headers = {};
    if (typeof Auth !== 'undefined' && Auth.getToken) {
      const token = Auth.getToken();
      if (token) {
        headers['Authorization'] = 'Bearer ' + token;
      }
    }

    const resp = await fetch(url, { headers });
    const text = await resp.text();
    try { return JSON.parse(text); }
    catch { return { code: -1, message: '服务器返回异常', data: null }; }
  } catch (err) {
    return { code: -1, message: '网络请求失败，请确认服务已启动并通过 http://localhost:3000 访问', data: null };
  }
}

async function apiPost(path, body) {
  try {
    // 自动添加 token（如果存在）
    const headers = { 'Content-Type': 'application/json' };
    if (typeof Auth !== 'undefined' && Auth.getToken) {
      const token = Auth.getToken();
      if (token) {
        headers['Authorization'] = 'Bearer ' + token;
      }
    }

    const resp = await fetch(path, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(body),
    });
    const text = await resp.text();
    try { return JSON.parse(text); }
    catch { return { code: -1, message: '服务器返回异常', data: null }; }
  } catch (err) {
    return { code: -1, message: '网络请求失败，请确认服务已启动并通过 http://localhost:3000 访问', data: null };
  }
}

// ====== 定位 ======
function detectLocation() {
  $('locationText').textContent = '正在定位中...';
  $('locationText').classList.add('loading');
  $('refreshLocation').style.display = 'none';

  if (!navigator.geolocation) {
    $('locationText').textContent = '浏览器不支持定位，请手动输入';
    $('departureCity').value = '';
    $('departureCity').focus();
    enableGenerate();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      state.userLongitude = pos.coords.longitude.toFixed(6);
      state.userLatitude = pos.coords.latitude.toFixed(6);
      try {
        const data = await apiGet('/api/reverse-geocode', {
          location: `${state.userLongitude},${state.userLatitude}`,
        });
        if (data.code === 0 && data.data) {
          const d = data.data;
          // 从 formatted_address 或 city 字段提取城市名
          let city = d.city || '';
          if (!city && d.formatted_address) {
            // 尝试从地址中提取
            const match = d.formatted_address.match(/(.+?[市省])/);
            if (match) city = match[1].replace(/[省市]$/, '');
          }
          city = cleanCityName(city);
          state.userCity = city;
          $('locationText').textContent = `${city || '定位成功'} 📍`;
          $('locationText').classList.remove('loading');
          $('departureCity').value = city || '';
          $('refreshLocation').style.display = 'inline';
          enableGenerate();
        } else {
          throw new Error(data.message || '定位解析失败');
        }
      } catch (err) {
        $('locationText').textContent = '定位失败，请手动输入城市';
        $('locationText').classList.remove('loading');
        $('departureCity').value = '';
        $('departureCity').focus();
        $('refreshLocation').style.display = 'inline';
        enableGenerate();
      }
    },
    (err) => {
      let msg = '定位失败';
      if (err.code === 1) msg = '定位权限被拒绝，请手动输入';
      else if (err.code === 2) msg = '定位不可用，请手动输入';
      else if (err.code === 3) msg = '定位超时，请手动输入';
      $('locationText').textContent = msg;
      $('locationText').classList.remove('loading');
      $('departureCity').value = '';
      $('departureCity').focus();
      $('refreshLocation').style.display = 'inline';
      enableGenerate();
    },
    { timeout: 8000, enableHighAccuracy: true }
  );
}

// ====== 场馆搜索建议 ======
function setupVenueSearch() {
  const input = $('venueInput');
  const list = $('venueSuggestions');

  input.addEventListener('input', () => {
    clearTimeout(state.suggestTimer);
    const keyword = input.value.trim();
    if (keyword.length < 2) {
      list.classList.remove('show');
      return;
    }
    state.suggestTimer = setTimeout(async () => {
      try {
        const data = await apiGet('/api/poi-search', { keywords: keyword, offset: 5 });
        if (data.code === 0 && data.data && data.data.places && data.data.places.length > 0) {
          list.innerHTML = data.data.places.map(p => `
            <div class="suggestion-item" data-venue='${JSON.stringify(p).replace(/'/g, "&#39;")}'>
              <div class="name">${p.name}</div>
              <div class="addr">${p.city || ''} ${p.district || ''} ${p.address || ''}</div>
            </div>
          `).join('');
          list.classList.add('show');

          // 绑定点击
          list.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
              const venue = JSON.parse(item.dataset.venue);
              input.value = venue.name;
              state.venueInfo = venue;
              list.classList.remove('show');
            });
          });
        } else {
          list.classList.remove('show');
        }
      } catch {
        list.classList.remove('show');
      }
    }, 300);
  });

  // 点击外部关闭
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.suggestions')) {
      list.classList.remove('show');
    }
  });
}

// ====== 城市机场查询 ======
async function getCityAirportCode(city) {
  const data = await apiGet('/api/city-airport', { city });
  if (data.code === 0 && data.data) {
    const d = data.data;
    // 优先用 matched_city_code，没有则取最近机场的 city_code
    let cityCode = d.matched_city_code || '';
    if (!cityCode && d.list && d.list.length > 0) {
      const nearest = d.list.find(a => a.is_nearest) || d.list[0];
      cityCode = nearest.city_code || '';
    }
    return {
      cityCode: cityCode,
      hasAirport: d.has_city_airport || false,
      airports: d.list || [],
    };
  }
  return null;
}

// ====== 清理城市名 ======
function cleanCityName(name) {
  if (!name) return '';
  // 只去掉"市""自治州""自治县""县"后缀，不要去掉"州"字本身
  return name.replace(/(自治州|自治县|市|县)$/, '').trim();
}

// ====== 查找城市火车站名 ======
async function findTrainStation(city) {
  const cleanCity = cleanCityName(city);
  try {
    const data = await apiGet('/api/poi-search', { keywords: '火车站', city: cleanCity, offset: 5 });
    if (data.code === 0 && data.data && data.data.places) {
      // 优先找高铁站（名称含"北""东"的通常是高铁站）
      const places = data.data.places;
      // 先找带"北"或"东"的
      let station = places.find(p => /[北东西南]/.test(p.name));
      if (!station) station = places[0];
      if (station) {
        // 去掉括号内容和"站"后缀（高铁API需要"深圳北"而非"深圳北站"）
        return station.name.replace(/\(.*\)/g, '').replace(/（.*）/g, '').replace(/站$/, '').trim();
      }
    }
  } catch {}
  return cleanCity;
}

// ====== 生成行程 ======
async function generateItinerary() {
  console.log('[行程] 开始生成行程');
  clearError();

  // 验证输入
  const artist = $('artistName').value.trim();
  const venue = $('venueInput').value.trim();
  const date = $('concertDate').value;
  const depCity = $('departureCity').value.trim();

  if (!venue) { showError('请输入演出场馆'); return; }
  if (!date) { showError('请选择演出日期'); return; }
  if (!depCity) { showError('请输入出发城市'); return; }

  showLoading('正在规划演唱会行程...', '正在搜索场馆、交通和酒店信息');

  state.concertDate = date;

  try {
    // 步骤1: 搜索场馆 POI（如果用户没从建议中选）
    if (!state.venueInfo || state.venueInfo.name !== venue) {
      showLoading('正在定位演出场馆...', '搜索场馆精确位置');
      const poiData = await apiGet('/api/poi-search', { keywords: venue, offset: 1 });
      if (poiData.code !== 0 || !poiData.data || !poiData.data.places || poiData.data.places.length === 0) {
        throw new Error('未找到该演出场馆，请确认场馆名称是否正确');
      }
      state.venueInfo = poiData.data.places[0];
    }

    const venueCity = cleanCityName(state.venueInfo.city || '');
    state.arrivalCity = venueCity;

    if (!venueCity) {
      throw new Error('无法确定场馆所在城市，请尝试更精确的场馆名称');
    }

    // 澳门特殊处理：演出在澳门时，酒店和机票使用珠海
    const isMacao = venueCity.includes('澳门') || venueCity === 'Macau' || venueCity === 'Macao';
    const searchCity = isMacao ? '珠海' : venueCity;

    // 步骤2: 查询出发城市和到达城市的机场代码 + 火车站名
    showLoading('正在查询交通信息...', isMacao ? '搜索机场和火车站（澳门演出，为您搜索珠海交通）' : '搜索机场和火车站');
    const [depAirport, arrAirport, depStation, arrStation] = await Promise.all([
      getCityAirportCode(depCity),
      getCityAirportCode(searchCity),
      findTrainStation(depCity),
      findTrainStation(searchCity),
    ]);

    // 步骤3: 并行查询机票、高铁、酒店
    const tasks = [];

    // 机票查询：同时搜索当天和提前一天到达的航班
    if (depAirport && depAirport.cityCode && arrAirport && arrAirport.cityCode) {
      state.departureAirportCode = depAirport.cityCode;
      state.arrivalAirportCode = arrAirport.cityCode;

      const prevDate = addDaysToDateISO(date, -1);

      const flightTodayPromise = apiPost('/api/flight-search', {
        from_code: depAirport.cityCode,
        to_code: arrAirport.cityCode,
        depart_date: date,
      }).then(d => (d.code === 0 && d.data && d.data.flights) ? d.data.flights : []);

      const flightPrevPromise = apiPost('/api/flight-search', {
        from_code: depAirport.cityCode,
        to_code: arrAirport.cityCode,
        depart_date: prevDate,
      }).then(d => {
        const flights = (d.code === 0 && d.data && d.data.flights) ? d.data.flights : [];
        // 标记为提前一天到达
        return flights.map(f => ({ ...f, _prevDay: true, _prevDayDate: prevDate }));
      });

      tasks.push(
        Promise.all([flightTodayPromise, flightPrevPromise])
          .then(([todayFlights, prevFlights]) => {
            state.results.flights = [...prevFlights, ...todayFlights];
          })
          .catch(() => { state.results.flights = []; })
      );
    } else {
      state.results.flights = [];
    }

    // 高铁查询（使用查到的火车站名）
    tasks.push(
      apiPost('/api/train-search', {
        from_station: depStation,
        to_station: arrStation,
        dep_date: date,
      }).then(d => { state.results.trains = (d.code === 0 && d.data && d.data.trains) ? d.data.trains : []; })
        .catch(() => { state.results.trains = []; })
    );

    // 酒店级联分页查询：5km优先加载最多200家，不足则扩到10km/20km
    const hotelSearchPromise = (async () => {
      // 澳门演出时搜索珠海酒店
      let hotelSearchDestination = state.venueInfo.name;
      let hotelAdcode = state.venueInfo.adcode;
      let hotelLat = state.venueInfo.latitude;
      let hotelLng = state.venueInfo.longitude;

      if (isMacao) {
        // 搜索珠海市中心作为酒店目的地
        try {
          const zhuhaiPoi = await apiGet('/api/poi-search', { keywords: '珠海市', city: '珠海', offset: 1 });
          if (zhuhaiPoi.code === 0 && zhuhaiPoi.data && zhuhaiPoi.data.places && zhuhaiPoi.data.places.length > 0) {
            const zhCity = zhuhaiPoi.data.places[0];
            hotelSearchDestination = '珠海';
            hotelAdcode = zhCity.adcode;
            hotelLat = zhCity.latitude;
            hotelLng = zhCity.longitude;
          }
        } catch (e) {
          // 如果获取珠海信息失败，仍使用澳门场馆信息作为降级方案
          console.warn('获取珠海位置信息失败，使用澳门场馆位置', e);
        }
      }

      // 保存酒店搜索位置信息，供"加载更多"功能使用
      state.hotelSearchLocation = {
        destination: hotelSearchDestination,
        adcode: hotelAdcode,
        latitude: hotelLat,
        longitude: hotelLng
      };

      const baseBody = {
        destination: hotelSearchDestination,
        check_in: date,
        check_out: getNextDate(date),
      };
      if (hotelAdcode) baseBody.adcode = hotelAdcode;

      const hasCoords = hotelLat && hotelLng;

      async function searchHotelPage(radius, page) {
        const body = { ...baseBody, sort_by: 'distance', page_size: 50, page };
        if (hasCoords) {
          body.latitude = hotelLat;
          body.longitude = hotelLng;
          body.radius = radius;
        }
        try {
          const d = await apiPost('/api/hotel-search', body);
          const hotels = (d.code === 0 && d.data && d.data.hotels) ? d.data.hotels : [];
          const total = (d.code === 0 && d.data && d.data.page_info && d.data.page_info.total) ? d.data.page_info.total : hotels.length;
          return { hotels, total };
        } catch (e) {
          return { hotels: [], total: 0 };
        }
      }

      let allHotels = [];
      let currentRadius = 5000;
      let hasMore = false;
      let total = 0;

      // 尝试 5km -> 10km -> 20km
      const radii = hasCoords ? [5000, 10000, 20000] : [null];
      for (const radius of radii) {
        currentRadius = radius || 0;
        const first = await searchHotelPage(radius, 1);
        if (first.hotels.length === 0) continue;

        allHotels = [...first.hotels];
        total = first.total;

        // 继续加载后续页，最多到200家（4页）
        const maxPage = Math.min(4, Math.ceil(total / 50));
        for (let page = 2; page <= maxPage; page++) {
          const next = await searchHotelPage(radius, page);
          if (next.hotels.length === 0) break;
          allHotels.push(...next.hotels);
        }

        // 如果当前半径已经够多（>=50家），不再扩大到更大半径
        if (allHotels.length >= 50) {
          hasMore = total > allHotels.length;
          break;
        }
        // 如果不够50家，记录还有更大半径可以尝试
        hasMore = true;
      }

      // fallback：纯城市搜索
      if (allHotels.length === 0) {
        const cityRes = await searchHotelPage(null, 1);
        allHotels = cityRes.hotels;
        total = cityRes.total;
      }

      state.results.hotels = allHotels;
      state.hotelsMeta = { total, loaded: allHotels.length, radius: currentRadius, hasMore };
    })();
    tasks.push(hotelSearchPromise);

    // 城际巴士查询（调用龙虾API）
    const busSearchPromise = (async () => {
      if (!depCity || !state.arrivalCity || depCity === state.arrivalCity) {
        state.results.buses = [];
        return;
      }

      try {
        const [depCityInfo, arrCityInfo] = await Promise.all([
          apiGet('/api/city-airport', { city: depCity }),
          apiGet('/api/city-airport', { city: state.arrivalCity }),
        ]);

        const depCode = depCityInfo.code === 0 && depCityInfo.data
          ? (depCityInfo.data.matched_city_code || (depCityInfo.data.list && depCityInfo.data.list[0] && depCityInfo.data.list[0].city_code)) || ''
          : '';
        const arrCode = arrCityInfo.code === 0 && arrCityInfo.data
          ? (arrCityInfo.data.matched_city_code || (arrCityInfo.data.list && arrCityInfo.data.list[0] && arrCityInfo.data.list[0].city_code)) || ''
          : '';

        if (!depCode || !arrCode) {
          state.results.buses = [];
          return;
        }

        const d = await apiPost('/api/bus-search', {
          date,
          start_city_code: depCode,
          end_city_code: arrCode,
          page_size: 50,
          page: 1,
          sort_by: 'dep_time',
        });

        if (d.code === 0 && d.data && d.data.lines) {
          state.results.buses = d.data.lines.map(line => ({
            bus_code: line.gid || line.line_gid || '',
            from_station: line.start_station_name || line.from_city + '客运站',
            to_station: line.end_station_name || line.to_city + '客运站',
            dep_time: line.dep_time || '',
            arr_time: (() => {
              if (!line.dep_time || !line.duration) return '';
              const [h, m] = line.dep_time.split(':').map(Number);
              const totalMin = h * 60 + m + line.duration;
              const arrH = Math.floor(totalMin / 60) % 24;
              const arrM = Math.floor(totalMin % 60);
              return `${String(arrH).padStart(2, '0')}:${String(arrM).padStart(2, '0')}`;
            })(),
            arrive_days: line.duration && line.duration >= 1440 ? '1' : '0',
            duration: line.duration ? Math.round(line.duration / 60) + '小时' : '',
            bus_type: line.class_name || '',
            bus_type_name: line.class_name || '',
            distance: line.distance || 0,
            seats: [{
              seat_type_name: line.class_name || '普通座',
              price: line.price || 0,
              left_tickets: line.avail_seat_count || 0,
            }],
            _minPrice: line.price || 0,
            _before5pm: isArriveBefore5pm(line.dep_time, line.duration >= 1440 ? '1' : '0'),
            gid: line.gid,
            line_name: line.line_name,
          }));
        } else {
          state.results.buses = [];
        }
      } catch (e) {
        console.error('巴士查询失败:', e);
        state.results.buses = [];
      }
    })();
    tasks.push(busSearchPromise);

    // 打车功能已独立，不再随行程自动查询
    state.results.taxis = [];
    // 自动填充出发地（演出信息中的出发城市）和目的地（场馆信息）
    state.taxi.fromName = depCity || '';
    state.taxi.fromLat = state.userLatitude || '';
    state.taxi.fromLng = state.userLongitude || '';
    state.taxi.fromAdcode = state.venueInfo && state.venueInfo.adcode ? state.venueInfo.adcode : '';
    if (state.venueInfo && state.venueInfo.name) {
      state.taxi.toName = state.venueInfo.name;
      state.taxi.toLat = state.venueInfo.latitude || '';
      state.taxi.toLng = state.venueInfo.longitude || '';
      state.taxi.toAdcode = state.venueInfo.adcode || '';
    }

    showLoading('正在搜索最优方案...', '对比机票、高铁、巴士和酒店价格');
    await Promise.all(tasks);

    hideLoading();

    // 重置拟选择和酒店分页元数据
    state.selected = { flight: null, train: null, bus: null, taxi: null, hotel: null };
    state.autoRecommended = false;
    state.hotelsMeta = { total: 0, loaded: 0, radius: 5000, hasMore: false };

    // 检查是否有任何结果
    const hasFlights = state.results.flights.length > 0;
    const hasHotels = state.results.hotels.length > 0;

    if (!hasFlights && !hasHotels) {
      showError('暂未找到符合条件的结果，可能是该日期/路线暂无票源。建议更换日期重试。', true);
      return;
    }

    // 过滤掉不可行的班次（已出发或无法按时到达）
    const now = new Date();
    const isTodayShow = state.concertDate &&
      new Date(state.concertDate.replace(/-/g, '/')).getTime() ===
      new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    if (isTodayShow) {
      state.results.flights = state.results.flights.filter(f => isTransportFeasible(f, 'flight'));
    }

    // 检查是否有可行的机票
    const hasFeasibleFlights = state.results.flights.length > 0;

    // 设置无可行交通标志（用于行程概览显示提示）
    state.noFeasibleTransport = !hasFeasibleFlights;

    // 渲染结果（即使没有可行交通也继续渲染）
    renderSummary();
    renderFlights();
    // renderTrains();
    // renderBuses();
    // renderTaxis();
    renderHotels();
    // 智能推荐：综合性价比最优方案
    autoRecommendBest();
    // 渲染应援地图
    const artistName = $('artistName').value.trim();
    const mapTheme = getEffectiveTheme(artistName);
    renderMap(state.arrivalCity, mapTheme);
    $('resultsSection').classList.add('show');

    // 滚动到结果
    setTimeout(() => {
      $('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 200);

  } catch (err) {
    hideLoading();
    console.error('[Generate Error]', err);
    const msg = err.message || '生成行程时出错，请稍后重试';
    if (msg.includes('Token') || msg.includes('401') || msg.includes('鉴权')) {
      showError('服务认证失败，Token 可能已失效。请联系管理员检查。');
    } else {
      showError(msg, true);
    }
  }
}

// ====== 智能推荐：综合性价比最优方案 ======
function calcFlightDuration(f) {
  try {
    const dep = f.dep_time, arr = f.arr_time;
    if (!dep || !arr) return 180; // 默认3小时
    const dDate = new Date(dep.replace(/-/g, '/'));
    const aDate = new Date(arr.replace(/-/g, '/'));
    const diff = (aDate - dDate) / 60000; // 分钟
    return diff > 0 ? diff : 180;
  } catch { return 180; }
}

function calcTrainBusDuration(item) {
  try {
    const depT = getTimePart(item.dep_time) || item.dep_time;
    const arrT = getTimePart(item.arr_time) || item.arr_time;
    if (!depT || !arrT) return 300;
    const dMatch = depT.match(/(\d{1,2}):(\d{2})/);
    const aMatch = arrT.match(/(\d{1,2}):(\d{2})/);
    if (!dMatch || !aMatch) return 300;
    const dMin = parseInt(dMatch[1]) * 60 + parseInt(dMatch[2]);
    let aMin = parseInt(aMatch[1]) * 60 + parseInt(aMatch[2]);
    const days = parseInt(item.arrive_days || '0');
    aMin += days * 1440;
    let diff = aMin - dMin;
    if (diff <= 0) diff = 300;
    return diff;
  } catch { return 300; }
}

function autoRecommendBest() {
  // 机票候选（只考虑可行的）
  const flights = getSortedFlights();
  const flightCandidates = [];

  flights.forEach((f, idx) => {
    if (!isTransportFeasible(f, 'flight')) return;
    flightCandidates.push({
      idx,
      price: f._minPrice,
      duration: calcFlightDuration(f),
      before5pm: f._before5pm ? 100 : 40,
    });
  });

  if (flightCandidates.length > 0) {
    const minPrice = Math.min(...flightCandidates.map(c => c.price));
    const minDuration = Math.min(...flightCandidates.map(c => c.duration));

    flightCandidates.forEach(c => {
      const priceScore = (minPrice / c.price) * 100;
      const timeScore = (minDuration / c.duration) * 100;
      c.score = priceScore * 0.40 + timeScore * 0.35 + c.before5pm * 0.25;
    });

    flightCandidates.sort((a, b) => b.score - a.score);
    selectFlight(flightCandidates[0].idx);
    state.noFeasibleTransport = false;
  } else {
    // 没有可行的机票方案，设置标志位
    state.noFeasibleTransport = true;
  }

  // 酒店推荐：直接使用综合排序的第一位
  const hotels = getFilteredSortedHotels();
  if (hotels.length > 0) {
    selectHotel(0); // 选择综合排序第一位
  }

  state.autoRecommended = true;
}

    const fArrDays = getFlightArriveDays(sel.flight);

    transportText = `✈️ ${sel.flight.flight_no || ''} ${concertDateMD} ${fDepT} → ${fArrDateMD} ${fArrT}${fArrDays > 0 ? ' (+'+fArrDays+'天)' : ''}`;

    // 没有可行的交通方案
    transportText = '⚠️ 暂无合适的机票方案，无法按时到达演出场地';

      hotelText = `¥${cheapestHotel}/晚 起 (未选择)`;

  if (costs.length > 0) totalEstimate = `¥${costs.reduce((a,b) => a+b, 0)}${sel.flight || sel.hotel ? '' : ' 起'}`;

  $('summaryCard').innerHTML = `
    <div style="font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
      📋 行程概览
      ${state.autoRecommended && (sel.flight || sel.hotel) ? '<span style="font-size:11px;font-weight:600;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:2px 10px;border-radius:20px;">智能推荐</span>' : ''}
    </div>
    ${$('artistName').value.trim() ? `
    <div class="summary-row">
      <span class="icon">🎤</span>
      <span class="label">演出</span>
      <span class="value">${$('artistName').value.trim()}</span>
    </div>` : ''}
    <div class="summary-row">
      <span class="icon">📍</span>
      <span class="label">场馆</span>
      <span class="value">${venue.name}</span>
    </div>
    <div class="summary-row">
      <span class="icon">📅</span>
      <span class="label">日期</span>
      <span class="value">${formatDate(state.concertDate)}</span>
    </div>
    <div class="summary-row">
      <span class="icon">🚗</span>
      <span class="label">出发</span>
      <span class="value">${$('departureCity').value.trim()} → ${state.arrivalCity}</span>

    <div class="summary-row">
      <span class="icon">✈️</span>

    <div class="summary-row">
      <span class="icon">🏨</span>
      <span class="label">住宿</span>
      <span class="value ${sel.hotel ? '' : 'muted'}">${hotelText}</span>
    </div>
    ${totalEstimate ? `
    <div class="summary-row" style="margin-top:8px;padding-top:12px;border-top:2px dashed #e9d5ff;">
      <span class="icon">💰</span>
      <span class="label">预估总价</span>

  if (state.selected.flight && state.selected.flight._id === idx) {
    state.selected.flight = null; // 取消选择

    state.selected.flight = { ...item, _id: idx, _price: item._minPrice };

  renderFlights(); renderSummary();
}

        <div class="emoji">✈️</div>

  const concertDateMD = formatDate(state.concertDate);
  container.innerHTML = sorted.map((f, idx) => {
    const cabin = (f._availCabins || []).find(c => c.adult_price === f._minPrice) || (f._availCabins || [])[0] || {};
    const price = cabin.adult_price || cabin.lowest_price || f._minPrice;
    const isDirect = (f.stop_count || 0) === 0;
    const isCheapest = idx === 0;
    const isSelected = state.selected.flight && state.selected.flight._id === idx;
    const depTimeStr = getTimePart(f.dep_time) || f.dep_time || '';
    const arrTimeStr = getTimePart(f.arr_time) || f.arr_time || '';
    const fArrDays = getFlightArriveDays(f);
    const arrDateMD = fArrDays > 0 ? addDaysToDateMD(state.concertDate, fArrDays) : concertDateMD;
    const isPrevDay = f._prevDay;
    const depDateMD = isPrevDay ? addDaysToDateMD(state.concertDate, -1) : concertDateMD;

    // 提前一天的航班显示"提前到达"，不需要显示17点警告
    let arrivalBadge;
    if (isPrevDay) {
      arrivalBadge = '<span class="transport-badge badge-direct">✅ 提前一天到达</span>';
    } else if (f._before5pm) {
      arrivalBadge = '<span class="transport-badge badge-direct">🌅 17点前到达</span>';

    return `
