async function saveItinerary() {
  if (!_currentUser) {
    window.location.href = '/login.html?redirect=/';
    return;
  }

  if (!state.results.flights.length && !state.results.hotels.length) {
    showToast('请先生成行程后再保存', 'error');
    return;
  }

  const concertName = state.venueInfo ? (state.venueInfo.name || '') : '';
  const title = (_currentUser.nickname || _currentUser.username || '我') + '的演唱会行程 - ' + (state.arrivalCity || state.userCity || '');
  const travelDate = state.concertDate || '';

  let totalBudget = 0;
  if (state.selected.flight && state.selected.flight._price) totalBudget += parseFloat(state.selected.flight._price) || 0;
  if (state.selected.train && state.selected.train._price) totalBudget += parseFloat(state.selected.train._price) || 0;
  if (state.selected.bus && state.selected.bus._price) totalBudget += parseFloat(state.selected.bus._price) || 0;
  if (state.selected.taxi && state.selected.taxi._price) totalBudget += parseFloat(state.selected.taxi._price) || 0;
  if (state.selected.hotel && state.selected.hotel._price) totalBudget += parseFloat(state.selected.hotel._price) || 0;

  const body = {
    title,
    depart_city: state.userCity || '',
    dest_city: state.arrivalCity || '',
    travel_date: travelDate,
    flight_info: state.selected.flight || null,
    train_info: state.selected.train || null,
    bus_info: state.selected.bus || null,
    taxi_info: state.selected.taxi || null,
    hotel_info: state.selected.hotel || null,
    check_in: travelDate,
    check_out: travelDate ? new Date(new Date(travelDate).getTime() + 86400000).toISOString().split('T')[0] : '',
    total_budget: totalBudget,
    notes: '',
    is_public: false,
  };

  const data = await Auth.apiPost('/api/itineraries', body);
  if (data && data.code === 0) {
    showToast('行程已保存！', 'success');
    setTimeout(() => {
      if (confirm('行程已保存成功！是否前往我的行程查看？')) {
        window.location.href = '/my-trips.html';
      }
    }, 1000);
  } else {
    showToast(data?.message || '保存失败', 'error');
  }
}

// ====== 购买功能 ======
async function purchaseItem(type, idx) {
  if (!_currentUser) {
    showToast('请先登录后再购买', 'error');
    setTimeout(() => { window.location.href = '/login.html?redirect=/'; }, 1500);
    return;
  }

  let item = null;
  let itemName = '';
  let itemDetail = '';
  let unitPrice = 0;
  let travelDate = state.concertDate || '';
  let offerId = '';

  if (type === 'flight') {
    const sorted = getSortedFlights();
    item = sorted[idx];
    if (!item) return;
    const cabin = (item._availCabins || []).find(c => c.adult_price === item._minPrice) || (item._availCabins || [])[0] || {};
    unitPrice = cabin.adult_price || item._minPrice;
    offerId = cabin.search_offer_id || cabin.offer_id || '';
    itemName = `${item.flight_no || ''} ${item.dep_city_name || ''}→${item.arr_city_name || ''}`;
    itemDetail = `${item.airline_name || ''} | ${getTimePart(item.dep_time) || item.dep_time || ''}-${getTimePart(item.arr_time) || item.arr_time || ''} | ${cabin.cabin_name || ''} | ${item.dep_airport_name || ''}→${item.arr_airport_name || ''}`;
  } else if (type === 'train') {
    const sorted = getSortedTrains();
    item = sorted[idx];
    if (!item) return;
    const seat = (item._availSeats || []).find(s => s.price === item._minPrice) || (item._availSeats || [])[0] || {};
    unitPrice = seat.price || item._minPrice;
    offerId = seat.search_offer_id || seat.offer_id || item.search_offer_id || '';
    itemName = `${item.train_code || ''} ${item.from_station || ''}→${item.to_station || ''}`;
    itemDetail = `${item.train_type_name || ''} | ${item.dep_time || ''}-${item.arr_time || ''} | ${seat.seat_type_name || ''} | 余票${seat.left_tickets}`;
  } else if (type === 'bus') {
    const sorted = getSortedBuses();
    item = sorted[idx];
    if (!item) return;
    const seat = (item._availSeats || []).find(s => s.price === item._minPrice) || (item._availSeats || [])[0] || {};
    unitPrice = seat.price || item._minPrice;
    offerId = seat.search_offer_id || seat.offer_id || '';
    itemName = `${item.bus_code || '巴士'} ${item.from_station || ''}→${item.to_station || ''}`;
    itemDetail = `${item.bus_type_name || '大巴'} | ${item.dep_time || ''}-${item.arr_time || ''} | ${seat.seat_type_name || ''} | 余票${seat.left_tickets}`;
  } else if (type === 'hotel') {
    const sorted = getFilteredSortedHotels();
    item = sorted[idx];
    if (!item) return;

    // ========== 酒店预订：先调用房型接口获取产品级 offer_id ==========
    try {
      showToast('正在查询房型...', 'info');

      const roomsData = await Auth.apiPost('/api/hotel-rooms', {
        search_offer_id: item.search_offer_id || item.offer_id || ''
      });

      if (roomsData.code === 0 && roomsData.data && roomsData.data.room_types) {
        const roomTypes = roomsData.data.room_types;

        if (roomTypes.length === 0) {
          showToast('该酒店暂无可预订房型，请选择其他酒店', 'error');
          return;
        }

        // 自动选择第一个房型的第一个产品
        const firstRoom = roomTypes[0];
        const firstProduct = (firstRoom.products || [])[0];

        if (!firstProduct || !firstProduct.offer_id) {
          showToast('该酒店暂无可预订产品，请选择其他酒店', 'error');
          return;
        }

        // 使用产品级 offer_id
        offerId = firstProduct.offer_id;
        unitPrice = firstProduct.price || item.min_price;

        console.log('获取产品级 offer_id 成功:', {
          room_name: firstRoom.room_name,
          product_name: firstProduct.product_name,
          price: firstProduct.price,
          offer_id: offerId.substring(0, 50) + '...'
        });

      } else {
        showToast(roomsData.message || '查询房型失败，请重新生成行程', 'error');
        return;
      }
    } catch (err) {
      console.error('查询房型失败:', err);
      showToast('查询房型失败，请重新生成行程', 'error');
      return;
    }

    itemName = item.hotel_name || '未知酒店';
    const features = [];
    if (item.has_wifi) features.push('WiFi');
    if (item.has_breakfast) features.push('含早');
    if (item.has_parking) features.push('停车');
    itemDetail = `¥${unitPrice}/晚 | 距场馆${item.distance_km != null ? Number(item.distance_km).toFixed(2) + 'km' : '未知'} | ${features.join(' · ') || '标准间'}`;
    travelDate = state.concertDate || '';
  } else if (type === 'taxi') {
    const taxis = state.results.taxis;
    item = taxis[idx];
    if (!item) return;
    unitPrice = item.estimated_price;
    offerId = item.offer_id || '';
    itemName = `${item.car_type_icon} ${item.car_type_name}`;
    itemDetail = `预估 ¥${item.estimated_price} | ${item.estimated_distance ? (item.estimated_distance / 1000).toFixed(1) + 'km' : '未知距离'} | ${item.estimated_duration ? Math.floor(item.estimated_duration / 60) + '分钟' : '未知时长'}`;
    travelDate = state.concertDate || '';
  }

  if (unitPrice <= 0 || unitPrice === Infinity) {
    showToast('价格信息异常，无法购买', 'error');
    return;
  }

  const purchasedItem = { ...item, _price: unitPrice };
  const tripContext = {
    depart_city: state.userCity || '',
    dest_city: state.arrivalCity || '',
    travel_date: state.concertDate || '',
    flight_info: state.selected.flight || (type === 'flight' ? purchasedItem : null),
    train_info: state.selected.train || (type === 'train' ? purchasedItem : null),
    bus_info: state.selected.bus || (type === 'bus' ? purchasedItem : null),
    hotel_info: state.selected.hotel || (type === 'hotel' ? purchasedItem : null),
  };

  const needPassengers = ['flight', 'train', 'bus'].includes(type);
  const needGuests = type === 'hotel';

  if (needPassengers || needGuests) {
    await showOrderFormModal({
      title: type === 'flight' ? `✈️ 购买 ${itemName}` : type === 'hotel' ? `🏨 预订 ${itemName}` : type === 'train' ? `🚄 购买 ${itemName}` : `🚌 购买 ${itemName}`,
      subtitle: `${travelDate || ''} · ¥${unitPrice}`,
      fields: needPassengers ? [
        { id: 'passengerName', label: '乘客姓名', type: 'text', placeholder: '请输入真实姓名', required: true },
        { id: 'passengerIdCard', label: '身份证号', type: 'text', placeholder: '请输入身份证号', required: true },
        { id: 'passengerPhone', label: '乘客手机', type: 'tel', placeholder: '请输入手机号', required: true },
        { id: 'passengerBirthday', label: '出生日期', type: 'date', placeholder: 'YYYY-MM-DD', required: false },
        { id: 'contactName', label: '联系人姓名', type: 'text', placeholder: '请输入联系人姓名', required: true },
        { id: 'contactPhone', label: '联系人手机', type: 'tel', placeholder: '请输入手机号', required: true },
      ] : [
        { id: 'guestName', label: '入住人姓名', type: 'text', placeholder: '请输入真实姓名', required: true },
        { id: 'guestIdCard', label: '身份证号', type: 'text', placeholder: '选填，有助于提高预订成功率', required: false },
        { id: 'contactName', label: '联系人姓名', type: 'text', placeholder: '请输入联系人姓名', required: true },
        { id: 'contactPhone', label: '联系人手机', type: 'tel', placeholder: '请输入手机号', required: true },
        { id: 'contactEmail', label: '联系人邮箱', type: 'email', placeholder: '选填', required: false },
      ],
      onSubmit: async (data) => {
        const orderData = await Auth.apiPost('/api/orders', {
          item_type: type,
          item_name: itemName,
          item_detail: itemDetail,
          item_snapshot: item,
          unit_price: unitPrice,
          quantity: 1,
          travel_date: travelDate,
          contact_name: data.contactName || _currentUser.nickname || _currentUser.username,
          contact_phone: data.contactPhone || _currentUser.phone || '',
          offer_id: offerId,
          passengers: needPassengers ? [{
            type: 'adult',
            name: data.passengerName,
            id_type: 'ID_CARD',
            id_number: data.passengerIdCard,
            phone: data.passengerPhone,
            birthday: data.passengerBirthday || '',
            nationality_code: 'CN'
          }] : undefined,
          guests: needGuests ? [{
            name: data.guestName,
            id_number: data.guestIdCard || '',
            id_type: data.guestIdCard ? 'ID_CARD' : ''
          }] : undefined,
          trip_context: tripContext,
        });

        if (orderData && orderData.code === 0) {
          window.location.href = '/payment.html?order_id=' + orderData.data.id;
        } else {
          showToast(orderData?.message || '创建订单失败', 'error');
        }
      },
    });
  } else {
    const orderData = await Auth.apiPost('/api/orders', {
      item_type: type,
      item_name: itemName,
      item_detail: itemDetail,
      item_snapshot: item,
      unit_price: unitPrice,
      quantity: 1,
      travel_date: travelDate,
      contact_name: _currentUser.nickname || _currentUser.username,
      contact_phone: _currentUser.phone || '',
      offer_id: offerId,
      trip_context: tripContext,
    });

    if (orderData && orderData.code === 0) {
      window.location.href = '/payment.html?order_id=' + orderData.data.id;
    } else {
      showToast(orderData?.message || '创建订单失败', 'error');
    }
  }
}

// 通用下单弹窗（支持真实支付）
function showOrderFormModal({ title, subtitle, fields, onSubmit }) {
  return new Promise((resolve) => {
    const modal = document.createElement('div');
    modal.className = 'order-modal';
    modal.id = 'orderModal';
    modal.innerHTML = `
      <div class="order-modal-overlay" onclick="closeOrderModal()"></div>
      <div class="order-modal-content">
        <div class="order-modal-header">
          <div class="order-modal-title">${title}</div>
          <div class="order-modal-subtitle">${subtitle}</div>
          <button class="order-modal-close" onclick="closeOrderModal()">×</button>
        </div>
        <div class="order-modal-body">
          ${fields.map(f => `
            <div class="order-form-group">
              <label class="order-form-label">${f.label}${f.required ? '<span class="required">*</span>' : ''}</label>
              <input type="${f.type}" id="${f.id}" class="order-form-input" placeholder="${f.placeholder}" ${f.required ? 'required' : ''}>
            </div>
          `).join('')}
        </div>
        <div class="order-modal-footer">
          <button class="order-btn-secondary" onclick="closeOrderModal()">取消</button>
          <button class="order-btn-primary" id="orderSubmitBtn">确认下单</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    try {
      const userData = JSON.parse(localStorage.getItem('user_profile') || '{}');
      fields.forEach(f => {
        if (f.id === 'contactName') {
          const el = document.getElementById(f.id);
          if (el) el.value = userData.nickname || userData.username || '';
        }
        if (f.id === 'contactPhone') {
          const el = document.getElementById(f.id);
          if (el) el.value = userData.phone || '';
        }
      });
    } catch {}

    document.getElementById('orderSubmitBtn').onclick = async () => {
      const btn = document.getElementById('orderSubmitBtn');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '提交中...';

      const data = {};
      let valid = true;
      fields.forEach(f => {
        const el = document.getElementById(f.id);
        if (el) {
          data[f.id] = el.value.trim();
          if (f.required && !data[f.id]) {
            valid = false;
            showToast(`${f.label}不能为空`, 'error');
          }
        }
      });

      if (!valid) {
        btn.disabled = false;
        btn.textContent = originalText;
        return;
      }

      try {
        await onSubmit(data);
        closeOrderModal();
        resolve(true);
      } catch (e) {
        btn.disabled = false;
        btn.textContent = originalText;
        showToast('提交失败，请重试', 'error');
        resolve(false);
      }
    };
  });
}
</script>
