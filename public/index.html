// 打车独立状态
function taxiEnsureState() {
  if (!state.taxi) {
    state.taxi = {
      fromName: '', fromLat: '', fromLng: '', fromAdcode: '',
      toName: '', toLat: '', toLng: '', toAdcode: '',
      timeMode: 'now', customTime: '',
    };
  }
}

// 定位按钮
async function taxiLocate(which, btn) {
  taxiEnsureState();
  if (!navigator.geolocation) { showToast('浏览器不支持定位', 'error'); return; }

  if (!btn) btn = event.target;
  btn.classList.add('loading');
  showToast('正在定位...', 'info');

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    btn.classList.remove('loading');

    try {
      const data = await apiGet('/api/reverse-geocode', { location: `${lng},${lat}` });
      let addr = `当前位置(${lat},${lng})`;
      let adcode = '';
      if (data.code === 0 && data.data) {
        const d = data.data;
        addr = d.formatted_address || d.address || addr;
        adcode = d.adcode || '';
      }
      if (which === 'from') {
        state.taxi.fromName = addr;
        state.taxi.fromLat = lat;
        state.taxi.fromLng = lng;
        state.taxi.fromAdcode = adcode;
        $('taxiFromInput').value = addr;
      } else {
        state.taxi.toName = addr;
        state.taxi.toLat = lat;
        state.taxi.toLng = lng;
        state.taxi.toAdcode = adcode;
        $('taxiToInput').value = addr;
      }
      /* renderTaxis(); */
      showToast('定位成功', 'success');
    } catch (e) {
      showToast('逆地理编码失败，使用原始坐标', 'error');
      if (which === 'from') {
        state.taxi.fromName = `当前位置(${lat},${lng})`;
        state.taxi.fromLat = lat;
        state.taxi.fromLng = lng;
        $('taxiFromInput').value = state.taxi.fromName;
      } else {
        state.taxi.toName = `当前位置(${lat},${lng})`;
        state.taxi.toLat = lat;
        state.taxi.toLng = lng;
        $('taxiToInput').value = state.taxi.toName;
      }
      /* renderTaxis(); */
    }
  }, (err) => {
    btn.classList.remove('loading');
    showToast('定位失败: ' + err.message, 'error');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// 交换出发地和目的地
function taxiSwapAddrs() {
  taxiEnsureState();
  const tmp = { ...state.taxi };
  state.taxi.fromName = tmp.toName;
  state.taxi.fromLat = tmp.toLat;
  state.taxi.fromLng = tmp.toLng;
  state.taxi.fromAdcode = tmp.toAdcode;
  state.taxi.toName = tmp.fromName;
  state.taxi.toLat = tmp.fromLat;
  state.taxi.toLng = tmp.fromLng;
  state.taxi.toAdcode = tmp.fromAdcode;
  renderTaxis();
}

// 设置出发时间
function taxiSetTime(mode) {
  taxiEnsureState();
  state.taxi.timeMode = mode;
  if (mode === 'custom') {
    const dt = new Date();
    dt.setMinutes(dt.getMinutes() + 30);
    const defaultVal = dt.toISOString().slice(0, 16);
    state.taxi.customTime = state.taxi.customTime || defaultVal;
  }
  renderTaxis();
}

// 独立搜索打车
async function taxiDoSearch() {
  taxiEnsureState();

  const fromInput = $('taxiFromInput').value.trim();
  const toInput = $('taxiToInput').value.trim();

  if (!fromInput || !toInput) {
    showToast('请输入出发地和目的地', 'error');
    return;
  }

  const btn = $('taxiSearchBtn');
  btn.disabled = true;
  btn.textContent = '🔍 搜索中...';

  try {
    // 如果输入框内容和之前不同，需要重新搜索地址坐标
    let fromLat = state.taxi.fromLat;
    let fromLng = state.taxi.fromLng;
    let fromAdcode = state.taxi.fromAdcode;
    let toLat = state.taxi.toLat;
    let toLng = state.taxi.toLng;
    let toAdcode = state.taxi.toAdcode;

    // 出发地：如果输入变了或没坐标，搜索POI
    if (fromInput !== state.taxi.fromName || !fromLat) {
      const fromData = await apiGet('/api/poi-search', { keywords: fromInput, offset: 1 });
      if (fromData.code === 0 && fromData.data && fromData.data.places && fromData.data.places.length > 0) {
        const p = fromData.data.places[0];
        fromLat = p.latitude;
        fromLng = p.longitude;
        fromAdcode = p.adcode || '';
        state.taxi.fromName = fromInput;
        state.taxi.fromLat = fromLat;
        state.taxi.fromLng = fromLng;
        state.taxi.fromAdcode = fromAdcode;
      } else {
        showToast('未找到出发地: ' + fromInput, 'error');
        btn.disabled = false; btn.textContent = '🔍 搜索打车';
        return;
      }
    }

    // 目的地：如果输入变了或没坐标，搜索POI
    if (toInput !== state.taxi.toName || !toLat) {
      const toData = await apiGet('/api/poi-search', { keywords: toInput, offset: 1 });
      if (toData.code === 0 && toData.data && toData.data.places && toData.data.places.length > 0) {
        const p = toData.data.places[0];
        toLat = p.latitude;
        toLng = p.longitude;
        toAdcode = p.adcode || '';
        state.taxi.toName = toInput;
        state.taxi.toLat = toLat;
        state.taxi.toLng = toLng;
        state.taxi.toAdcode = toAdcode;
      } else {
        showToast('未找到目的地: ' + toInput, 'error');
        btn.disabled = false; btn.textContent = '🔍 搜索打车';
        return;
      }
    }

    // 计算预约时间
    const now = new Date();
    let orderType = 1;
    let bookingTime = undefined;

    if (state.taxi.timeMode === '30min') {
      const t = new Date(now.getTime() + 30 * 60000);
      if (t > now) { orderType = 2; bookingTime = formatTaxiTime(t); }
    } else if (state.taxi.timeMode === '1hour') {
      const t = new Date(now.getTime() + 60 * 60000);
      if (t > now) { orderType = 2; bookingTime = formatTaxiTime(t); }
    } else if (state.taxi.timeMode === 'custom' && state.taxi.customTime) {
      const t = new Date(state.taxi.customTime.replace(/-/g, '/'));
      if (t > now) { orderType = 2; bookingTime = formatTaxiTime(t); }
    }

    const reqBody = {
      from_name: fromInput,
      from_addr: fromInput,
      from_lat: String(fromLat),
      from_lng: String(fromLng),
      from_adcode: fromAdcode,
      to_name: toInput,
      to_addr: toInput,
      to_lat: String(toLat),
      to_lng: String(toLng),
      to_adcode: toAdcode,
      order_type: orderType,
    };
    if (bookingTime) reqBody.booking_time = bookingTime;

    const d = await apiPost('/api/taxi-estimate', reqBody);

    if (d.code === 0 && d.data) {
      const taxiResult = d.data;
      const taxiTypes = [];
      const typeMap = {
        economy: { name: '经济型', icon: '🚕' },
        premium: { name: '舒适型', icon: '🚙' },
        business: { name: '商务型', icon: '🛻' },
        luxury: { name: '豪华型', icon: '🚗' },
      };

      Object.entries(typeMap).forEach(([key, info]) => {
        const quote = taxiResult[key];
        if (quote && quote.available) {
          taxiTypes.push({
            car_type: key,
            car_type_name: info.name,
            car_type_icon: info.icon,
            estimated_price: quote.estimated_price,
            estimated_distance: quote.estimated_distance,
            estimated_duration: quote.estimated_duration,
            offer_id: quote.offer_id,
            supplier_count: quote.supplier_count,
            estimate_trace_id: taxiResult.estimate_trace_id,
          });
        }
      });

      // 按价格排序
      taxiTypes.sort((a, b) => a.estimated_price - b.estimated_price);
      state.results.taxis = taxiTypes;
      state.selected.taxi = null;
      /* renderTaxis(); */
      renderSummary();
      showToast('找到 ' + taxiTypes.length + ' 种车型', 'success');
    } else {
      showToast('打车查询失败: ' + (d.message || '未知错误'), 'error');
    }
  } catch (e) {
    console.error('[打车] 查询失败:', e);
    showToast('打车查询失败: ' + (e.message || '网络错误'), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 搜索打车';
  }
}

function formatTaxiTime(d) {
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

// ====== 酒店筛选 + 排序 ======
// 默认过滤50元以下的低质酒店 + 无房酒店，支持价格区间与多种排序
function getFilteredSortedHotels() {
  const f = state.hotelFilter;
  const filtered = state.results.hotels.filter(h => {
    const price = h.min_price;
    // 过滤掉无价格（满房/不可订）的酒店
    if (price == null || price <= 0) return false;
    if (price < f.minPrice) return false;
    if (f.maxPrice != null && f.maxPrice !== '' && price > f.maxPrice) return false;
    return true;
  });
  const sortBy = f.sortBy || 'rating';
  return [...filtered].sort((a, b) => {
    if (sortBy === 'price_asc') return (a.min_price || Infinity) - (b.min_price || Infinity);
    if (sortBy === 'price_desc') return (b.min_price || -1) - (a.min_price || -1);
    if (sortBy === 'distance') return (a.distance_km ?? Infinity) - (b.distance_km ?? Infinity);
    // 综合推荐：评分降序 → 价格升序（避免低价低质酒店霸榜）
    const ra = a.review_score || 0, rb = b.review_score || 0;
    if (rb !== ra) return rb - ra;
    return (a.min_price || Infinity) - (b.min_price || Infinity);
  });
}

// 应用酒店价格区间筛选
function applyHotelFilter() {
  const minEl = $('hotelMinPrice');
  const maxEl = $('hotelMaxPrice');
  const sortEl = $('hotelSortBy');
  if (minEl) {
    const minVal = parseInt(minEl.value);
    state.hotelFilter.minPrice = (isNaN(minVal) || minVal < 0) ? 0 : minVal;
  }
  if (maxEl) {
    const maxVal = parseInt(maxEl.value);
    state.hotelFilter.maxPrice = (isNaN(maxVal) || maxVal <= 0) ? null : maxVal;
  }
  if (sortEl) state.hotelFilter.sortBy = sortEl.value;
  // 重置已选酒店索引（列表可能变化）
  state.selected.hotel = null;
  renderHotels(); renderSummary();
}

// 加载更多酒店（扩大搜索半径）
async function loadMoreHotels() {
  const btn = document.getElementById('loadMoreHotelsBtn');
  if (btn) { btn.disabled = true; btn.textContent = '加载中...'; }

  const meta = state.hotelsMeta;

  // 使用保存的酒店搜索位置（澳门演出时为珠海位置）
  const searchLocation = state.hotelSearchLocation || {
    destination: state.venueInfo.name,
    adcode: state.venueInfo.adcode,
    latitude: state.venueInfo.latitude,
    longitude: state.venueInfo.longitude
  };

  const baseBody = {
    destination: searchLocation.destination,
    check_in: state.concertDate,
    check_out: getNextDate(state.concertDate),
  };
  if (searchLocation.adcode) baseBody.adcode = searchLocation.adcode;

  const hasCoords = searchLocation.latitude && searchLocation.longitude;
  const existingIds = new Set(state.results.hotels.map(h => h.hotel_id));
  let newHotels = [];

  // 计算下一个更大的半径
  const nextRadius = meta.radius === 5000 ? 10000 : (meta.radius === 10000 ? 20000 : 0);

  if (nextRadius > 0 && hasCoords) {
    for (let page = 1; page <= 4; page++) {
      const body = {
        ...baseBody, sort_by: 'distance', page_size: 50, page,
        latitude: searchLocation.latitude,
        longitude: searchLocation.longitude,
        radius: nextRadius,
      };
      try {
        const d = await apiPost('/api/hotel-search', body);
        const hotels = (d.code === 0 && d.data && d.data.hotels) ? d.data.hotels : [];
        if (hotels.length === 0) break;
        const unique = hotels.filter(h => !existingIds.has(h.hotel_id));
        newHotels.push(...unique);
        if (hotels.length < 50) break;
      } catch (e) { break; }
    }
  }

  if (newHotels.length > 0) {
    state.results.hotels.push(...newHotels);
    state.hotelsMeta.loaded += newHotels.length;
    state.hotelsMeta.radius = nextRadius;
    state.hotelsMeta.hasMore = nextRadius < 20000;
    renderHotels();
    showToast(`已加载 ${newHotels.length} 家更多酒店`, 'success');
  } else {
    state.hotelsMeta.hasMore = false;
    renderHotels();
    showToast('没有更多酒店了', 'info');
  }
}

  if (sorted.length === 0) {
    container.innerHTML = filterBarHtml + `
      <div class="empty-state">
        <div class="emoji">🔍</div>

          ${h.main_picture
            ? `<img class="hotel-img" src="${h.main_picture}" alt="${h.hotel_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="hotel-img-placeholder" style="display:none;">🏨</div>`

              ${h.star_tag ? `<span class="hotel-star">${h.star_tag}</span>` : ''}

              ${h.distance_km != null ? `<div class="hotel-distance">距场馆 ${Number(h.distance_km).toFixed(2)}km</div>` : ''}

          <button class="select-btn ${isSelected ? 'selected' : ''}" onclick="selectHotel(${idx})">${isSelected ? '已选择' : '选择'}</button>
          <button class="buy-btn" onclick="purchaseItem('hotel', ${idx})">🎫 预订</button>
        </div>

  const moreBtnHtml = meta.hasMore ? `
    <div style="text-align:center;margin:24px 0 16px;">

  const scrollTopHtml = `<button class="scroll-top-btn" onclick="scrollToHotelFilter()" title="回到筛选">👆</button>`;

  container.innerHTML += moreBtnHtml + scrollTopHtml;
  setupScrollTopBtn();
}

// ====== 分享功能 ======
function buildShareText() {
  const artist = $('artistName').value.trim();
  const venue = state.venueInfo;
  const depCity = $('departureCity').value.trim();
  const date = formatDate(state.concertDate);
  const theme = getEffectiveTheme(artist);

  let text = '';
  if (theme.fanName || hasCustomTheme()) {
    text += `${theme.slogan || '应援出发'}\n`;
    if (theme.fanName) text += `「${theme.fanName}专属行程」\n`;
    text += '━━━━━━━━━━━━━\n';
  }
  const titleName = artist || '演唱会';
  text += `🎵 ${titleName}行程方案\n`;
  text += '━━━━━━━━━━━━━\n';
  if (artist) text += `🎤 ${artist}\n`;
  text += `📍 ${venue.name}\n`;
  text += `📅 ${date}\n`;
  text += `🚗 ${depCity} → ${state.arrivalCity}\n`;
  text += '━━━━━━━━━━━━━\n';

  // 机票
  if (state.results.flights.length > 0) {
    if (state.selected.flight) {
      const f = state.selected.flight;
      const fDepT = getTimePart(f.dep_time) || f.dep_time || '';
      const fArrT = getTimePart(f.arr_time) || f.arr_time || '';
      const fArrDays = getFlightArriveDays(f);
      const fArrDate = fArrDays > 0 ? addDaysToDateMD(state.concertDate, fArrDays) : date;
      text += `\n✈️ 已选航班\n`;
      text += `  ★ ${f.flight_no || ''} ${date} ${fDepT} → ${fArrDate} ${fArrT}${fArrDays > 0 ? ' (+'+fArrDays+'天)' : ''} ¥${f._price}\n`;
      text += `  ${f.dep_city_name || depCity} → ${f.arr_city_name || state.arrivalCity}\n`;
    } else {
      const top3 = getSortedFlights()
        .filter(f => f._minPrice !== Infinity)
        .slice(0, 3);
      if (top3.length > 0) {
        text += '\n✈️ 机票推荐\n';
        top3.forEach(f => {
          const fDepT = getTimePart(f.dep_time) || f.dep_time || '';
          const fArrT = getTimePart(f.arr_time) || f.arr_time || '';
          const fArrDays = getFlightArriveDays(f);
          const fArrDate = fArrDays > 0 ? addDaysToDateMD(state.concertDate, fArrDays) : date;
          const tag = f._before5pm ? '🌅' : (fArrDays > 0 ? '⚠️' : '');
          text += `  ${tag} ${f.flight_no || ''} ${date} ${fDepT} → ${fArrDate} ${fArrT}${fArrDays > 0 ? ' (+'+fArrDays+'天)' : ''} ¥${f._minPrice}\n`;
          text += `  ${f.dep_city_name || depCity} → ${f.arr_city_name || state.arrivalCity}\n`;
        });
      }
    }
  }

  // 高铁
  if (state.results.trains.length > 0) {
    if (state.selected.train) {
      const t = state.selected.train;
      const tArrDays = parseInt(t.arrive_days || '0');
      const tArrDate = tArrDays > 0 ? addDaysToDateMD(state.concertDate, tArrDays) : date;
      text += `\n🚄 已选高铁\n`;
      text += `  ★ ${t.train_code || ''} ${date} ${t.dep_time || ''}-${tArrDate} ${t.arr_time || ''} ¥${t._price}\n`;
      text += `  ${t.from_station || depCity} → ${t.to_station || state.arrivalCity}\n`;
    } else {
      const top3 = getSortedTrains()
        .filter(t => t._minPrice !== Infinity)
        .slice(0, 3);
      if (top3.length > 0) {
        text += '\n🚄 高铁推荐\n';
        top3.forEach(t => {
          const tArrDays = parseInt(t.arrive_days || '0');
          const tArrDate = tArrDays > 0 ? addDaysToDateMD(state.concertDate, tArrDays) : date;
          const tag = t._before5pm ? '🌅' : '';
          text += `  ${tag} ${t.train_code || ''} ${date} ${t.dep_time || ''}-${tArrDate} ${t.arr_time || ''} ¥${t._minPrice}\n`;
          text += `  ${t.from_station || depCity} → ${t.to_station || state.arrivalCity}\n`;
        });
      }
    }
  }

  // 巴士
  if (state.results.buses.length > 0) {
    if (state.selected.bus) {
      const b = state.selected.bus;
      const bArrDays = parseInt(b.arrive_days || '0');
      const bArrDate = bArrDays > 0 ? addDaysToDateMD(state.concertDate, bArrDays) : date;
      text += `\n🚌 已选巴士\n`;
      text += `  ★ ${b.bus_code || ''} ${date} ${b.dep_time || ''}-${bArrDate} ${b.arr_time || ''} ¥${b._price}\n`;
      text += `  ${b.from_station || depCity} → ${b.to_station || state.arrivalCity}\n`;
    } else {
      const top3 = getSortedBuses()
        .filter(b => b._minPrice !== Infinity)
        .slice(0, 3);
      if (top3.length > 0) {
        text += '\n🚌 巴士推荐\n';
        top3.forEach(b => {
          const bArrDays = parseInt(b.arrive_days || '0');
          const bArrDate = bArrDays > 0 ? addDaysToDateMD(state.concertDate, bArrDays) : date;
          const tag = b._before5pm ? '🌅' : '';
          text += `  ${tag} ${b.bus_code || ''} ${date} ${b.dep_time || ''}-${bArrDate} ${b.arr_time || ''} ¥${b._minPrice}\n`;
          text += `  ${b.from_station || depCity} → ${b.to_station || state.arrivalCity}\n`;
        });
      }
    }
  }

  // 酒店
  if (state.results.hotels.length > 0) {
    if (state.selected.hotel) {
      const h = state.selected.hotel;
      text += `\n🏨 已选酒店\n`;
      text += `  ★ ${h.hotel_name} ¥${h._price}/晚`;
      if (h._dist != null) text += ` (距场馆${h._dist}km)`;
      text += '\n';
    } else {
      const top3 = [...state.results.hotels]
        .sort((a, b) => (a.min_price || Infinity) - (b.min_price || Infinity))
        .slice(0, 3);
      text += '\n🏨 酒店推荐\n';
      top3.forEach(h => {
        text += `  ${h.hotel_name} ¥${h.min_price}/晚`;
        if (h.distance_km != null) text += ` (距场馆${Number(h.distance_km).toFixed(2)}km)`;
        text += '\n';
      });
    }
  }

  // 总价
  const costs = [];
  const selFlightP = state.selected.flight ? state.selected.flight._price : null;
  const selTrainP = state.selected.train ? state.selected.train._price : null;
  const selBusP = state.selected.bus ? state.selected.bus._price : null;
  const selHotelP = state.selected.hotel ? state.selected.hotel._price : null;
  if (selFlightP !== null) costs.push(selFlightP);
  else if (selTrainP !== null) costs.push(selTrainP);
  else if (selBusP !== null) costs.push(selBusP);
  else {
    const sortedFlights = getSortedFlights();
    const sortedTrains = getSortedTrains();
    const sortedBuses = getSortedBuses();
    const cheapestFlight = sortedFlights.length > 0 ? sortedFlights[0]._minPrice : null;
    const cheapestTrain = sortedTrains.length > 0 ? sortedTrains[0]._minPrice : null;
    const cheapestBus = sortedBuses.length > 0 ? sortedBuses[0]._minPrice : null;
    const allCheap = [cheapestFlight, cheapestTrain, cheapestBus].filter(p => p !== null);
    if (allCheap.length > 0) costs.push(Math.min(...allCheap));
  }
  if (selHotelP !== null) costs.push(selHotelP);
  else {
    const cheapestHotel = state.results.hotels.length > 0
      ? Math.min(...state.results.hotels.map(h => h.min_price || 999999)) : null;
    if (cheapestHotel !== null) costs.push(cheapestHotel);
  }
  const hasSelection = state.selected.flight || state.selected.train || state.selected.bus || state.selected.hotel;
  if (costs.length > 0) {
    text += '\n━━━━━━━━━━━━━\n';
    text += `💰 ${hasSelection ? '已选总价' : '预估总价'} ¥${costs.reduce((a,b) => a+b, 0)}${hasSelection ? '' : ' 起'}\n`;
  }
  text += '\n数据来源: 龙虾出行开放平台';

  return text;
}

function showCopyToast(msg) {
  let toast = $('copyToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copyToast';
    toast.className = 'copy-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

async function shareItinerary(type) {
  if (type === 'text') {
    const text = buildShareText();
    try {
      await navigator.clipboard.writeText(text);
      showCopyToast('已复制到剪贴板 📋');
    } catch {
      // 兼容旧浏览器
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopyToast('已复制到剪贴板 📋');
    }
  } else if (type === 'image') {
    await generateShareImage();
  }
}

const DEFAULT_THEME = { primary:'#7C3AED', secondary:'#EC4899', bg1:'#f5f3ff', bg2:'#fdf2f8', accent:'#7C3AED', fanName:'', slogan:'', decor:'sparkle', pageBg:'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)' };
function detectTheme(name) {
  if (!name) return DEFAULT_THEME;
  for (const [k, t] of Object.entries(STAR_THEMES)) { if (name.includes(k)) return t; }
  return DEFAULT_THEME;
}

// 颜色工具：调亮/调暗 hex 色
function lightenHex(hex, amount) {
  const h = hex.replace('#', '');
  const r = Math.min(255, parseInt(h.substring(0, 2), 16) + Math.round(255 * amount));
  const g = Math.min(255, parseInt(h.substring(2, 4), 16) + Math.round(255 * amount));
  const b = Math.min(255, parseInt(h.substring(4, 6), 16) + Math.round(255 * amount));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}
function darkenHex(hex, amount) {
  const h = hex.replace('#', '');
  const r = Math.max(0, parseInt(h.substring(0, 2), 16) - Math.round(255 * amount));
  const g = Math.max(0, parseInt(h.substring(2, 4), 16) - Math.round(255 * amount));
  const b = Math.max(0, parseInt(h.substring(4, 6), 16) - Math.round(255 * amount));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

// 获取生效主题（系统匹配 + 自定义覆盖）
function getEffectiveTheme(name) {
  const base = detectTheme(name);
  const ct = state.customTheme;
  const hasCustom = ct.color || ct.fanName || ct.slogan;
  if (!hasCustom) return base;

  // 深拷贝基础主题
  const merged = { ...base };

  // 自定义应援色覆盖
  if (ct.color) {
    merged.primary = ct.color;
    merged.secondary = lightenHex(ct.color, 0.15);
    merged.accent = darkenHex(ct.color, 0.1);
  }

  // 自定义粉丝名覆盖
  if (ct.fanName !== null && ct.fanName !== '') {
    merged.fanName = ct.fanName;
  }

  // 自定义口号覆盖
  if (ct.slogan !== null && ct.slogan !== '') {
    merged.slogan = ct.slogan;
  }

  // 如果有自定义色但系统没匹配到粉丝名/口号，也标记为 themed
  if (ct.color && !merged.fanName) merged.fanName = merged.fanName || '';
  if (ct.color && !merged.slogan) merged.slogan = merged.slogan || '应援出发';

  return merged;
}

// 检查是否有任何自定义设置
function hasCustomTheme() {
  const ct = state.customTheme;
  return !!(ct.color || (ct.fanName && ct.fanName.trim()) || (ct.slogan && ct.slogan.trim()));
}

// ====== 主题切换：柔和配色方案 ======
function applyTheme(name) {
  const theme = getEffectiveTheme(name);
  const root = document.documentElement;
  // 有粉丝名 或 有自定义色 → 显示主题横幅
  const isThemed = !!(theme.fanName || hasCustomTheme());

  // 切换 CSS 变量（仅用于点缀元素）
  root.style.setProperty('--primary', theme.primary);
  root.style.setProperty('--primary-light', theme.secondary);
  root.style.setProperty('--accent', theme.accent || theme.primary);
  root.style.setProperty('--accent-light', theme.secondary);
  root.style.setProperty('--shadow-hover', `0 8px 30px ${theme.primary}26`);

  // 柔和背景：用极淡的主题色调，而非浓烈应援色
  if (isThemed) {
    // 生成极淡的背景色（白色为主，掺入少量主题色）
    root.style.setProperty('--theme-tint', hexToRgba(theme.primary, 0.06));
    root.style.setProperty('--bg-gradient',
      `linear-gradient(180deg, ${hexToRgba(theme.primary, 0.08)} 0%, ${hexToRgba(theme.secondary, 0.04)} 25%, #ffffff 60%)`);
  } else {
    root.style.setProperty('--theme-tint', '#f0eef5');
    root.style.setProperty('--bg-gradient', 'linear-gradient(180deg, #f0eef5 0%, #f8f9fa 30%, #ffffff 100%)');
  }

  // 横幅
  const banner = $('themeBanner');
  if (isThemed) {
    banner.style.background = `linear-gradient(135deg, ${theme.primary}, ${theme.secondary})`;
    $('themeSlogan').textContent = theme.slogan || '应援出发';
    $('themeFanName').textContent = theme.fanName ? `「${theme.fanName}专属行程」` : '';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  // 给卡片添加主题色左边框
  document.querySelectorAll('.card').forEach(c => {
    if (isThemed) c.classList.add('themed-card');
    else c.classList.remove('themed-card');
  });

  // 更新自定义区域 UI 状态
  updateCustomThemeUI();
}

// 更新自定义应援区域 UI
function updateCustomThemeUI() {
  const section = $('customThemeSection');
  const badge = $('customBadge');
  if (hasCustomTheme()) {
    section.classList.add('has-custom');
    badge.innerHTML = '<span class="custom-theme-badge">已自定义</span>';
  } else {
    section.classList.remove('has-custom');
    badge.innerHTML = '';
  }
}

// 同步自定义输入框的值和占位符
function syncCustomThemeInputs(name) {
  const base = detectTheme(name);

  // 应援色：无自定义时显示系统默认，有自定义时显示自定义值
  const colorVal = state.customTheme.color || base.primary;
  $('customColorPicker').value = colorVal;
  $('customColorHex').value = colorVal.toUpperCase();

  // 粉丝名称：占位符显示系统默认，值显示自定义值
  $('customFanName').placeholder = base.fanName ? `系统默认: ${base.fanName}` : '输入粉丝名称';
  $('customFanName').value = state.customTheme.fanName || '';

  // 应援口号：占位符显示系统默认，值显示自定义值
  $('customSlogan').placeholder = base.slogan ? `系统默认: ${base.slogan}` : '输入应援口号';
  $('customSlogan').value = state.customTheme.slogan || '';
}

// 颜色工具：hex 转 rgba
function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 经纬度转画布坐标
function lngLatToXY(lng, lat, mapX, mapY, mapW, mapH) {
  const x = mapX + (lng - 72) / (136 - 72) * mapW;
  const y = mapY + (54 - lat) / (54 - 17) * mapH;
  return { x, y };
}

// 查找城市坐标（模糊匹配）
function findCityCoord(cityName) {
  if (!cityName) return null;
  const clean = cleanCityName(cityName);
  // 精确匹配
  let city = CHINA_CITIES.find(c => c.name === clean);
  if (city) return city;
  // 包含匹配
  city = CHINA_CITIES.find(c => c.name.includes(clean) || clean.includes(c.name));
  if (city) return city;
  // 取前两字匹配
  if (clean.length >= 2) {
    city = CHINA_CITIES.find(c => c.name.startsWith(clean.substring(0, 2)));
    if (city) return city;
  }
  return null;
}

// 模糊匹配城市行政区划代码
function findCityAdcode(cityName) {
  if (!cityName) return null;
  const clean = cleanCityName(cityName);
  if (CITY_ADCODES[clean]) return CITY_ADCODES[clean];
  for (const [k, v] of Object.entries(CITY_ADCODES)) {
    if (k.includes(clean) || clean.includes(k)) return v;
  }
  if (clean.length >= 2) {
    for (const [k, v] of Object.entries(CITY_ADCODES)) {
      if (k.startsWith(clean.substring(0, 2))) return v;
    }
  }
  return null;
}

// 绘制中国地图（分享图片用，保持正确比例）
function drawChinaMap(ctx, mapX, mapY, mapW, mapH, highlightCity, theme, cityGeo) {
  ctx.save();

  // 卡片背景 + 圆角
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = '#ffffff';
  roundRect(ctx, mapX, mapY, mapW, mapH, 12);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // 裁剪区域
  ctx.save();
  roundRect(ctx, mapX, mapY, mapW, mapH, 12);
  ctx.clip();

  // 淡色网格背景
  ctx.strokeStyle = '#f0f1f3';
  ctx.lineWidth = 0.5;
  for (let gx = mapX; gx <= mapX + mapW; gx += 30) {
    ctx.beginPath(); ctx.moveTo(gx, mapY); ctx.lineTo(gx, mapY + mapH); ctx.stroke();
  }
  for (let gy = mapY; gy <= mapY + mapH; gy += 30) {
    ctx.beginPath(); ctx.moveTo(mapX, gy); ctx.lineTo(mapX + mapW, gy); ctx.stroke();
  }

  // 绘制中国轮廓（带渐变填充）
  ctx.beginPath();
  CHINA_OUTLINE.forEach((pt, i) => {
    const { x, y } = lngLatToXY(pt[0], pt[1], mapX, mapY, mapW, mapH);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();

  // 渐变填充
  const fillGrad = ctx.createLinearGradient(mapX, mapY, mapX + mapW, mapY + mapH);
  fillGrad.addColorStop(0, '#eef2f7');
  fillGrad.addColorStop(0.5, '#e8edf2');
  fillGrad.addColorStop(1, '#e2e8f0');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // 描边
  ctx.strokeStyle = '#b0bcc8';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore(); // 恢复裁剪

  // 绘制主要城市点 + 标签（省会级）
  const majorCities = [
    '北京','上海','广州','深圳','杭州','南京','成都','武汉','重庆','西安',
    '长沙','天津','苏州','郑州','青岛','沈阳','哈尔滨','大连','济南','昆明',
    '福州','厦门','南昌','贵阳','南宁','海口','三亚','合肥','太原','石家庄',
  ];
  ctx.save();
  majorCities.forEach(name => {
    const c = CHINA_CITIES.find(cc => cc.name === name);
    if (!c) return;
    const { x, y } = lngLatToXY(c.lng, c.lat, mapX, mapY, mapW, mapH);
    // 城市点
    ctx.fillStyle = '#9ba8b8';
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
    // 主要城市标签（仅标注少量大城市的名字，避免拥挤）
    if (['北京','上海','广州','成都','武汉','西安','重庆'].includes(name)) {
      ctx.fillStyle = '#8b97a7';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(name, x, y - 6);
    }
  });
  ctx.restore();

  // 高亮目标城市
  if (highlightCity) {
    const city = findCityCoord(highlightCity);
    if (city) {
      const { x, y } = lngLatToXY(city.lng, city.lat, mapX, mapY, mapW, mapH);
      const color = theme ? theme.primary : '#7C3AED';
      const glowColor = theme ? theme.secondary : '#EC4899';

      if (cityGeo) {
        // ===== 点亮：用城市行政边界多边形，在全国地图上填充应援色 =====
        // 收集所有多边形环（Polygon / MultiPolygon）
        const rings = [];
        (cityGeo.features || []).forEach(f => {
          const g = f.geometry;
          if (!g) return;
          if (g.type === 'Polygon') g.coordinates.forEach(r => rings.push(r));
          else if (g.type === 'MultiPolygon') g.coordinates.forEach(poly => poly.forEach(r => rings.push(r)));
        });
        // 用与全国地图一致的投影把经纬度映射到画框，作为一条整体路径
        if (rings.length > 0) {
          ctx.save();
          // 先画一层柔和光晕（让点亮区域在全国图上更醒目）
          ctx.beginPath();
          rings.forEach(ring => {
            ring.forEach((c, i) => {
              const p = lngLatToXY(c[0], c[1], mapX, mapY, mapW, mapH);
              if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
          });
          ctx.lineJoin = 'round';
          // 整体填充应援色（evenodd 处理孔洞），透明度略高以在全国底图上突出
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.75;
          ctx.fill('evenodd');
          // 整体外轮廓加粗
          ctx.globalAlpha = 1;
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        }
      } else {
        // ===== 回退：无边界数据时用脉冲圆点标记 =====
        // 外层脉冲光晕
        for (let i = 5; i >= 1; i--) {
          ctx.save();
          ctx.globalAlpha = 0.06 * i;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x, y, 5 + i * 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // 涟漪环
        ctx.save();
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.arc(x, y, 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // 中心实心点
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fill();

        // 内圈高亮
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = glowColor;
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // 城市名标签（带主题色背景）——始终显示，方便在全国图上识别点亮位置
      ctx.save();
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      const labelW = ctx.measureText(city.name).width + 16;
      const labelH = 22;
      const labelX = x - labelW / 2;
      const labelY = y - 32;

      // 标签背景（圆角 + 主题色）
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 1;
      ctx.fillStyle = color;
      roundRect(ctx, labelX, labelY, labelW, labelH, 6);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      // 标签文字
      ctx.fillStyle = '#fff';
      ctx.textBaseline = 'middle';
      ctx.fillText(city.name, x, labelY + labelH / 2);

      // 连接线
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, y - 7);
      ctx.lineTo(x, labelY + labelH);
      ctx.stroke();
      ctx.restore();

      // 城市特色 emoji 装饰
      const highlights = getCityHighlights(highlightCity);
      if (highlights && mapW > 300) {
        ctx.save();
        ctx.font = '11px sans-serif';
        ctx.fillStyle = '#6b7280';
        ctx.textAlign = 'left';
        // 在地图右下角放城市特色
        const infoX = mapX + mapW - 130;
        const infoY = mapY + mapH - 30;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        roundRect(ctx, infoX - 6, infoY - 14, 126, 24, 4);
        ctx.fill();
        ctx.fillStyle = color;
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText(`📍 ${city.name}`, infoX, infoY);
        ctx.restore();
      }

      ctx.restore();
      return true;
    }
  }
  ctx.restore();
  return false;
}

// 获取城市特色（模糊匹配）
function getCityHighlights(cityName) {
  if (!cityName) return null;
  const clean = cleanCityName(cityName);
  // 精确匹配
  if (CITY_HIGHLIGHTS[clean]) return CITY_HIGHLIGHTS[clean];
  // 包含匹配
  for (const [k, v] of Object.entries(CITY_HIGHLIGHTS)) {
    if (k.includes(clean) || clean.includes(k)) return v;
  }
  // 取前两字匹配
  if (clean.length >= 2) {
    for (const [k, v] of Object.entries(CITY_HIGHLIGHTS)) {
      if (k.startsWith(clean.substring(0, 2))) return v;
    }
  }
  return null;
}

// Leaflet 地图实例
let leafletMapInstance = null;

// 在页面上渲染 Leaflet 地图
function renderMap(cityName, theme) {
  const mapDiv = $('leafletMap');
  if (!mapDiv) return;

  const city = findCityCoord(cityName);
  const color = theme ? theme.primary : '#7C3AED';

  // 销毁旧地图实例
  if (leafletMapInstance) {
    leafletMapInstance.remove();
    leafletMapInstance = null;
  }

  if (!city) {
    $('mapLegend').textContent = `城市 ${cityName} 暂未在地图库中`;
    $('mapSection').classList.add('show');
    $('cityHighlights').classList.remove('show');
    return;
  }

  // 先显示容器（Leaflet 需要可见容器才能正确计算尺寸）
  $('mapSection').classList.add('show');

  // 创建 Leaflet 地图
  leafletMapInstance = L.map('leafletMap', {
    zoomControl: false,
    attributionControl: false,
    scrollWheelZoom: false,
  }).setView([city.lat, city.lng], 10);

  // 确保地图正确渲染（容器从 hidden 切换到 visible 后需要刷新尺寸）
  setTimeout(() => { if (leafletMapInstance) leafletMapInstance.invalidateSize(); }, 100);

  // 使用 CartoDB Positron 浅色底图（更美观）
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
    subdomains: 'abcd',
  }).addTo(leafletMapInstance);

  // 添加缩放控件到右下
  L.control.zoom({ position: 'bottomright' }).addTo(leafletMapInstance);

  // 自定义应援色标记（城市中心点，作为城市名锚点）
  const markerHtml = `<div class="city-marker" style="background:${color};"></div>`;
  const markerIcon = L.divIcon({
    html: markerHtml,
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });
  const marker = L.marker([city.lat, city.lng], { icon: markerIcon }).addTo(leafletMapInstance);

  // 弹出窗口：只显示城市名
  const popupContent = `<div class="popup-title">📍 ${city.name}</div>`;
  marker.bindPopup(popupContent).openPopup();

  // 应援点亮：用行政区合并外轮廓 GeoJSON 把整座城市作为一个整体填充成应援色
  // 注意用 {adcode}.json（合并外轮廓），而非 {adcode}_full.json（会返回各区县独立多边形）
  const adcode = findCityAdcode(cityName);
  if (adcode) {
    fetch(`https://geo.datav.aliyun.com/areas_v3/bound/${adcode}.json`)
      .then(r => r.ok ? r.json() : Promise.reject(new Error('geojson 请求失败')))
      .then(geojson => {
        if (!leafletMapInstance) return;
        const cityLayer = L.geoJSON(geojson, {
          style: {
            color: color,           // 整体外轮廓颜色
            fillColor: color,       // 填充色
            fillOpacity: 0.45,
            weight: 3,              // 外轮廓加粗
            opacity: 1,
          },
        }).addTo(leafletMapInstance);
        // 让整座城市充满视野
        try {
          leafletMapInstance.fitBounds(cityLayer.getBounds(), { padding: [20, 20], maxZoom: 10 });
          marker.openPopup();
        } catch (e) {}
      })
      .catch(() => {
        // 拉取失败时回退为大范围圆形高亮
        if (!leafletMapInstance) return;
        L.circle([city.lat, city.lng], {
          color: color, fillColor: color, fillOpacity: 0.3,
          weight: 2, radius: 30000,
        }).addTo(leafletMapInstance);
      });
  } else {
    // 暂无 adcode：用大范围圆形高亮兜底
    L.circle([city.lat, city.lng], {
      color: color, fillColor: color, fillOpacity: 0.3,
      weight: 2, radius: 30000,
    }).addTo(leafletMapInstance);
  }

  // 更新图例
  $('mapLegend').innerHTML = `已点亮 <span style="color:${color};font-weight:700;">${city.name}</span> · ${theme && theme.fanName ? theme.fanName + '集结' : '应援点亮'}`;

  // 渲染城市特色卡片
  const highlights = getCityHighlights(cityName);
  renderCityHighlights(city.name, highlights, color);
}

// ====== Canvas 装饰绘制工具 ======
function drawStarShape(ctx, cx, cy, spikes, outerR, innerR, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color; ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / spikes - Math.PI / 2;
    const x = cx + Math.cos(a) * r, y2 = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y2) : ctx.lineTo(x, y2);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}
function drawSparkleShape(ctx, cx, cy, size, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color; ctx.beginPath();
  ctx.moveTo(cx, cy - size);
  ctx.quadraticCurveTo(cx + size * 0.15, cy - size * 0.15, cx + size, cy);
  ctx.quadraticCurveTo(cx + size * 0.15, cy + size * 0.15, cx, cy + size);
  ctx.quadraticCurveTo(cx - size * 0.15, cy + size * 0.15, cx - size, cy);
  ctx.quadraticCurveTo(cx - size * 0.15, cy - size * 0.15, cx, cy - size);
  ctx.closePath(); ctx.fill(); ctx.restore();
}
function drawDot(ctx, cx, cy, r, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}
function drawPlanet(ctx, cx, cy, r, color, ringColor, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.strokeStyle = ringColor; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(cx, cy, r * 1.6, r * 0.5, -0.3, 0, Math.PI * 2); ctx.stroke();
  const g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
  g.addColorStop(0, color); g.addColorStop(1, ringColor);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
function drawWave(ctx, cx, cy, w, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
  for (let x = 0; x <= w; x += 2) {
    const yo = Math.sin((x / w) * Math.PI * 2) * 6;
    x === 0 ? ctx.moveTo(cx + x, cy + yo) : ctx.lineTo(cx + x, cy + yo);
  }
  ctx.stroke(); ctx.restore();
}
function scatterDecorations(ctx, W, H, theme) {
  let seed = 42;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const c1 = theme.primary, c2 = theme.secondary;
  for (let i = 0; i < 28; i++) {
    const x = rand() * W, y = rand() * H, s = 3 + rand() * 5, a = 0.04 + rand() * 0.08;
    drawStarShape(ctx, x, y, 5, s, s * 0.4, rand() > 0.5 ? c1 : c2, a);
  }
  for (let i = 0; i < 35; i++) {
    const x = rand() * W, y = rand() * H, r = 1 + rand() * 3, a = 0.03 + rand() * 0.06;
    drawDot(ctx, x, y, r, rand() > 0.5 ? c1 : c2, a);
  }
  for (let i = 0; i < 14; i++) {
    const x = rand() * W, y = rand() * H, s = 4 + rand() * 6, a = 0.05 + rand() * 0.1;
    drawSparkleShape(ctx, x, y, s, rand() > 0.5 ? c1 : c2, a);
  }
}
function drawThemeDecor(ctx, x, y, theme, size, alpha) {
  const d = theme.decor;
  if (d === 'fire') {
    drawPlanet(ctx, x, y, size, theme.planet || theme.primary, theme.planetRing || theme.secondary, alpha);
  } else if (d === 'star') {
    drawStarShape(ctx, x, y, 5, size, size * 0.4, theme.primary, alpha);
    drawStarShape(ctx, x + size * 1.5, y + size * 0.3, 5, size * 0.7, size * 0.3, theme.secondary, alpha);
  } else if (d === 'ufo') {
    drawDot(ctx, x, y - size * 0.5, size * 0.5, theme.secondary, alpha);
    ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = theme.primary;
    ctx.beginPath(); ctx.ellipse(x, y, size, size * 0.4, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  } else if (d === 'wave') {
    drawWave(ctx, x - size, y, size * 2, theme.primary, alpha);
    drawWave(ctx, x - size * 0.7, y + size * 0.6, size * 1.4, theme.secondary, alpha * 0.8);
  } else if (d === 'music') {
    drawDot(ctx, x, y, size * 0.5, theme.primary, alpha);
    drawDot(ctx, x, y - size, size * 0.5, theme.secondary, alpha);
    ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = theme.primary; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x + size * 0.4, y); ctx.lineTo(x + size * 0.4, y - size); ctx.stroke(); ctx.restore();
  } else {
    drawSparkleShape(ctx, x, y, size, theme.primary, alpha);
  }
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

    }
  }

  // 酒店
  if (state.results.hotels.length > 0) {
    if (state.selected.hotel) {
      const h = state.selected.hotel;
      lines.push({ type: 'section', icon: '🏨', text: '已选酒店' });
      let txt = `★ ${h.hotel_name || '未知酒店'}`;
      if (h._dist != null) txt += ` (${h._dist}km)`;
      lines.push({ type: 'item', text: txt, price: `¥${h._price}/晚` });
    } else {
      lines.push({ type: 'section', icon: '🏨', text: '酒店推荐' });
      [...state.results.hotels]
        .sort((a, b) => (a.min_price || Infinity) - (b.min_price || Infinity))
        .slice(0, 2)
        .forEach(h => {
          let txt = h.hotel_name || '未知酒店';
          if (h.distance_km != null) txt += ` (${Number(h.distance_km).toFixed(2)}km)`;
          lines.push({ type: 'item', text: txt, price: `¥${h.min_price}/晚` });
        });
    }
  }

  // 总价
  const costs = [];
  const selFlightP = state.selected.flight ? state.selected.flight._price : null;
  const selTrainP = state.selected.train ? state.selected.train._price : null;
  const selBusP = state.selected.bus ? state.selected.bus._price : null;
  const selHotelP = state.selected.hotel ? state.selected.hotel._price : null;
  if (selFlightP !== null) costs.push(selFlightP);
  else if (selTrainP !== null) costs.push(selTrainP);
  else if (selBusP !== null) costs.push(selBusP);
  else {
    const sortedFlights = getSortedFlights();
    const sortedTrains = getSortedTrains();
    const sortedBuses = getSortedBuses();
    const cheapestFlight = sortedFlights.length > 0 ? sortedFlights[0]._minPrice : null;
    const cheapestTrain = sortedTrains.length > 0 ? sortedTrains[0]._minPrice : null;
    const cheapestBus = sortedBuses.length > 0 ? sortedBuses[0]._minPrice : null;
    const allCheap = [cheapestFlight, cheapestTrain, cheapestBus].filter(p => p !== null);
    if (allCheap.length > 0) costs.push(Math.min(...allCheap));
  }
  if (selHotelP !== null) costs.push(selHotelP);
  else {
    const cheapestHotel = state.results.hotels.length > 0
      ? Math.min(...state.results.hotels.map(h => h.min_price || 999999)) : null;
    if (cheapestHotel !== null) costs.push(cheapestHotel);
  }
  const hasSelection = state.selected.flight || state.selected.train || state.selected.bus || state.selected.hotel;
  if (costs.length > 0) {
    lines.push({ type: 'total', text: hasSelection ? '已选总价' : '预估总价', value: `¥${costs.reduce((a,b) => a+b, 0)}${hasSelection ? '' : ' 起'}` });
  }
  lines.push({ type: 'footer', text: '数据来源: 龙虾出行开放平台' });

  // 计算高度
  let y = 0;
  const pad = 30;
  const lineH = 32;
  const sectionH = 40;
  const titleH = 56;
  const totalH = 60;
  const footerH = 50;
  const heroH = isThemed ? 90 : 0;
  // 地图保持正确比例：中国经纬度比约 64:37 ≈ 1.73:1
  const mapDrawW = 480;
  const mapDrawH = Math.round(mapDrawW / 1.73); // ≈ 277
  const mapTitleH = 24;
  const mapH = mapTitleH + mapDrawH + 16;

  lines.forEach(l => {
    if (l.type === 'hero') y += heroH;
    else if (l.type === 'title') y += titleH;
    else if (l.type === 'map') y += mapH;
    else if (l.type === 'section') y += sectionH;
    else if (l.type === 'total') y += totalH;
    else if (l.type === 'footer') y += footerH;
    else y += lineH;
  });
  canvas.height = y + pad;

  // 绘制主题背景
  const grad = ctx.createLinearGradient(0, 0, W, canvas.height);
  grad.addColorStop(0, theme.bg1);
  grad.addColorStop(0.5, theme.bg2);
  grad.addColorStop(1, theme.bg1);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, canvas.height);

  // 散落装饰贴纸
  scatterDecorations(ctx, W, canvas.height, theme);

  // 顶部装饰条（主题色渐变）
  const topGrad = ctx.createLinearGradient(0, 0, W, 0);
  topGrad.addColorStop(0, theme.primary);
  topGrad.addColorStop(0.5, theme.secondary);
  topGrad.addColorStop(1, theme.primary);
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, W, 6);

  // 绘制内容
  y = pad;
  lines.forEach(l => {
    if (l.type === 'hero') {
      // ===== 主题横幅 =====
      const hGrad = ctx.createLinearGradient(pad, y, W - pad, y + 60);
      hGrad.addColorStop(0, theme.primary);
      hGrad.addColorStop(1, theme.secondary);
      ctx.fillStyle = hGrad;
      roundRect(ctx, pad, y, W - pad * 2, 60, 12);
      ctx.fill();
      // 左侧主题装饰
      drawThemeDecor(ctx, pad + 28, y + 30, 12, 0.7);
      // Slogan 文字
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(theme.slogan || '应援出发', W / 2, y + 28);
      // 粉丝名标签
      if (theme.fanName) {
        ctx.font = '12px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText(`「${theme.fanName}专属行程」`, W / 2, y + 48);
      }
      // 右侧主题装饰
      drawThemeDecor(ctx, W - pad - 28, y + 30, 10, 0.6);
      y += heroH;
    } else if (l.type === 'title') {
      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(l.text, pad, y + 28);
      // 分隔线（主题色淡色）
      ctx.strokeStyle = theme.primary + '40';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pad, y + 42);
      ctx.lineTo(W - pad, y + 42);
      ctx.stroke();
      // 右侧小星星装饰
      drawStarShape(ctx, W - pad - 8, y + 21, 5, 7, 3, theme.secondary, 0.35);
      y += titleH;
    } else if (l.type === 'row') {
      ctx.fillStyle = '#6b7280';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(l.icon, pad, y + 20);
      ctx.fillText(l.label, pad + 28, y + 20);
      ctx.fillStyle = '#1a1a2e';
      ctx.font = '600 15px sans-serif';
      const labelW = ctx.measureText(l.label).width;
      ctx.fillText(l.value, pad + 28 + labelW + 12, y + 20);
      y += lineH;
    } else if (l.type === 'map') {
      // ===== 应援地图（保持原比例不变形） =====
      // 地图标题
      ctx.fillStyle = theme.primary;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('🗺️ 应援点亮地图', pad, y + 18);
      y += mapTitleH;

      // 居中绘制地图，保持 1.73:1 比例
      const mapX = (W - mapDrawW) / 2;
      // 全国地图为底，仅在目标城市区域填充应援色点亮
      drawChinaMap(ctx, mapX, y, mapDrawW, mapDrawH, state.arrivalCity, theme, cityGeo);
      y += mapDrawH + 8;

      y += 8;
    } else if (l.type === 'section') {
      y += 8;
      // 左侧竖线装饰（主题色）
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = theme.secondary;
      ctx.fillRect(pad - 10, y + 4, 3, 22);
      ctx.restore();
      // 主题色标题
      ctx.fillStyle = theme.primary;
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`${l.icon} ${l.text}`, pad, y + 22);
      // 右侧小装饰
      drawSparkleShape(ctx, W - pad - 10, y + 18, 5, theme.secondary, 0.3);
      y += sectionH;
    } else if (l.type === 'item') {
      ctx.fillStyle = '#374151';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`  ${l.text}`, pad, y + 20);
      ctx.fillStyle = theme.accent;
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(l.price, W - pad, y + 20);
      y += lineH;
    } else if (l.type === 'total') {
      y += 8;
      // 分隔线（主题色）
      ctx.strokeStyle = theme.primary + '60';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(pad, y);
      ctx.lineTo(W - pad, y);
      ctx.stroke();
      ctx.setLineDash([]);
      y += 12;
      ctx.fillStyle = '#6b7280';
      ctx.font = '15px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`💰 ${l.text}`, pad, y + 22);
      ctx.fillStyle = theme.accent;
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(l.value, W - pad, y + 22);
      y += totalH;
    } else if (l.type === 'footer') {
      ctx.fillStyle = '#9ca3af';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(l.text, W / 2, y + 18);
      // 底部装饰排列
      const decoY = y + 34;
      drawSparkleShape(ctx, W / 2 - 45, decoY, 5, theme.secondary, 0.4);
      drawStarShape(ctx, W / 2 - 15, decoY, 5, 5, 2, theme.primary, 0.4);
      drawStarShape(ctx, W / 2 + 15, decoY, 5, 5, 2, theme.secondary, 0.4);
      drawSparkleShape(ctx, W / 2 + 45, decoY, 5, theme.primary, 0.4);
      y += footerH;
    }
  });

  const dataUrl = canvas.toDataURL('image/png');
  $('shareModalBody').innerHTML = `<img src="${dataUrl}" alt="行程图片">`;
  $('shareDownloadBtn').onclick = () => {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `${artist || '演唱会'}行程_${dateStr}.png`;
    a.click();
  };
}

function closeShareModal() {
  $('shareModal').classList.remove('show');
}

// ====== 留言板 ======
const MSG_STORAGE_KEY = 'concert_msg_board';
const AVATAR_COLORS = ['#7C3AED','#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#06B6D4'];
let msgImageData = null; // 当前待发送的图片 base64
let msgBoardState = {
  page: 1,
  limit: 10,
  total: 0,
  tag: 'all', // all, 实拍, 晒图, 搭子
  artist: '',
  concertId: ''
};

function loadMessages() {
  try {
    const raw = localStorage.getItem(MSG_STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveMessages(msgs) {
  try { localStorage.setItem(MSG_STORAGE_KEY, JSON.stringify(msgs)); } catch {}
}

function getDefaultMessages() {
  const now = Date.now();
  return [
    { id: now - 300000, author: '火星人小李', avatar: '火', color: '#EC4899', tag: '实拍', content: '有没有从上海出发的拼车？求拉群！', time: now - 300000, likes: 12, liked: false, replies: [{ author: '嘟嘟巴士', text: '可以关注公众号发起拼车哦~', time: now - 280000 }] },
    { id: now - 200000, author: '追光者', avatar: '追', color: '#F59E0B', tag: '晒图', content: '上次演唱会的应援色太绝了，这次也要满场应援色！', time: now - 200000, likes: 28, liked: false, replies: [] },
    { id: now - 120000, author: '莹火虫', avatar: '萤', color: '#10B981', tag: '实拍', content: '场馆附近的酒店好难抢啊，大家有什么推荐吗', time: now - 120000, likes: 8, liked: false, replies: [{ author: '路过的粉丝', text: '建议住地铁口附近，散场方便', time: now - 100000 }] },
  ];
}

function formatMsgTime(ts) {
  if (!ts || isNaN(ts)) return '';
  const diff = Date.now() - ts;
  if (diff < 0) return '刚刚';
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
  const d = new Date(ts);
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

async function renderMessages() {
  const body = $('msgBoardBody');
  let msgs = [];
  let total = 0;

  // 获取当前艺人或演出信息
  const artistName = $('artistName').value.trim();
  const concertSelect = $('concertSelect') ? $('concertSelect').value : '';

  // 更新状态
  msgBoardState.artist = artistName;
  msgBoardState.concertId = concertSelect;

  // 更新标签筛选UI中的艺人/演出标签
  updateMsgFilterTags(artistName, concertSelect);

  // 构建API URL
  let apiUrl = `/api/messages?page=${msgBoardState.page}&limit=${msgBoardState.limit}`;
  if (concertSelect) {
    apiUrl += `&concert_id=${concertSelect}`;
  } else if (artistName) {
    apiUrl += `&artist=${encodeURIComponent(artistName)}`;
  } else {
    // 未选择演出或艺人时，显示热门留言
    apiUrl += '&top=1';
  }
  if (msgBoardState.tag && msgBoardState.tag !== 'all') {
    apiUrl += `&tag=${encodeURIComponent(msgBoardState.tag)}`;
  }

  // 从后端API加载留言（留言列表是公开的）
  try {
    const data = await apiGet(apiUrl);
    if (data && data.code === 0) {
      total = data.data.total || 0;
      msgs = data.data.list.map(m => {
        let msgTime = Date.now();
        try {
          const ts = (m.created_at || '').replace(' ', 'T');
          const parsed = new Date(ts + '+08:00');
          if (!isNaN(parsed.getTime())) msgTime = parsed.getTime();
        } catch {}
        return {
          id: m.id,
          author: m.nickname || '匿名用户',
          avatar: (m.nickname || '?')[0],
          color: AVATAR_COLORS[m.user_id % AVATAR_COLORS.length],
          content: m.content || '',
          image: (m.sticker && (m.sticker.startsWith('data:image') || m.sticker.startsWith('http://') || m.sticker.startsWith('https://'))) ? m.sticker : '',
          sticker: (m.sticker && !(m.sticker.startsWith('data:image') || m.sticker.startsWith('http://') || m.sticker.startsWith('https://'))) ? m.sticker : '',
          tag: m.tag || '',
          artist: m.artist || '',
          time: msgTime,
          likes: m.likes_count || 0,
          liked: m.liked || false,
          isApi: true,
          replies: (m.replies || []).map(r => {
            let rTime = Date.now();
            try {
              const ts = (r.created_at || '').replace(' ', 'T');
              const parsed = new Date(ts + '+08:00');
              if (!isNaN(parsed.getTime())) rTime = parsed.getTime();
            } catch {}
            return {
              author: r.nickname || '匿名',
              text: r.content || '',
              time: rTime
            };
          })
        };
      });
    }
  } catch { /* 忽略错误，使用默认数据 */ }

  // 如果没有API数据，仅在未选择特定艺人或演出时展示默认示例留言
  // 选中艺人/演出后，不应展示不带有该艺人标签的无关留言
  if (msgs.length === 0 && !artistName && !concertSelect) {
    let defaults = getDefaultMessages();
    // 应用标签筛选
    if (msgBoardState.tag && msgBoardState.tag !== 'all') {
      defaults = defaults.filter(m => m.tag === msgBoardState.tag);
    }
    msgs = defaults;
    total = msgs.length;
  }

  msgBoardState.total = total;
  $('msgCount').textContent = total;

  // 更新分页UI
  updateMsgPagination();

  if (msgs.length === 0) {
    body.innerHTML = `<div class="msg-empty"><div class="emoji">💬</div><div>还没有留言，快来抢沙发~</div></div>`;
    return;
  }

  body.innerHTML = msgs.map(m => {
    const repliesHTML = (m.replies || []).map(r => `
      <div class="msg-reply">
        <span class="reply-author">${escapeHtml(r.author)}:</span>${escapeHtml(r.text)}
        <span style="float:right;font-size:10px;color:var(--text-light);">${formatMsgTime(r.time)}</span>
      </div>
    `).join('');

    // 构建标签HTML
    let tagsHTML = '';
    const tags = [];
    if (m.tag) tags.push(m.tag);
    if (m.artist) tags.push(m.artist);
    if (tags.length > 0) {
      tagsHTML = `<div class="msg-item-tags">${tags.map(t => `<span class="msg-item-tag">${escapeHtml(t)}</span>`).join('')}</div>`;
    }

    return `
      <div class="msg-item" data-id="${m.id}">
        <div class="msg-item-header">
          <div class="msg-avatar" style="background:${m.color};">${escapeHtml(m.avatar)}</div>
          <span class="msg-author">${escapeHtml(m.author)}</span>
          <span class="msg-time">${formatMsgTime(m.time)}</span>
        </div>
        ${tagsHTML}
        <div class="msg-content">${escapeHtml(m.content)}</div>
        ${m.sticker ? `<div class="msg-sticker">${escapeHtml(m.sticker)}</div>` : ''}
        ${m.image ? `<img class="msg-image" src="${m.image}" alt="图片" onclick="window.open('${m.image}','_blank')">` : ''}
        <div class="msg-actions">
          <span class="msg-action ${m.liked ? 'liked' : ''}" onclick="toggleLike(${m.id})">
            ${m.liked ? '❤️' : '🤍'} ${m.likes}
          </span>
          <span class="msg-action" onclick="toggleReply(${m.id})">💬 回复</span>
        </div>
        ${repliesHTML ? `<div class="msg-replies">${repliesHTML}</div>` : ''}
        <div class="msg-reply-input" id="replyInput_${m.id}">
          <input type="text" id="replyText_${m.id}" placeholder="回复 ${escapeHtml(m.author)}..." maxlength="200">
          <button onclick="postReply(${m.id})">回复</button>
        </div>
      </div>
    `;
  }).join('');
}

function updateMsgBoardTitle(artistName) {
  const titleEl = $('msgBoardTitle');
  if (!titleEl) return;
  // 标题只用表情，不用文字
  titleEl.textContent = '❤️';
}

// 更新标签筛选UI中的艺人/演出标签
function updateMsgFilterTags(artistName, concertSelect) {
  const filterEl = $('msgTagsFilter');
  if (!filterEl) return;

  // 基础标签（可点击筛选）
  let html = `<span class="msg-tag ${msgBoardState.tag === 'all' ? 'active' : ''}" data-tag="all" onclick="setMsgTag('all')">全部</span>`;
  html += `<span class="msg-tag ${msgBoardState.tag === '实拍' ? 'active' : ''}" data-tag="实拍" onclick="setMsgTag('实拍')">📷 共享舞台实拍</span>`;
  html += `<span class="msg-tag ${msgBoardState.tag === '晒图' ? 'active' : ''}" data-tag="晒图" onclick="setMsgTag('晒图')">😘 现场晒图</span>`;
  html += `<span class="msg-tag ${msgBoardState.tag === '搭子' ? 'active' : ''}" data-tag="搭子" onclick="setMsgTag('搭子')">🤝 寻找搭子</span>`;

  // 如果有艺人或演出，添加展示标签（不可点击，仅展示当前筛选范围）
  if (artistName) {
    html += `<span class="msg-tag" style="opacity:0.7;cursor:default;" title="当前已按此艺人筛选">🎤 ${escapeHtml(artistName)}</span>`;
  }
  if (concertSelect) {
    html += `<span class="msg-tag" style="opacity:0.7;cursor:default;" title="当前已按此演出筛选">🎫 当前演出</span>`;
  }

  filterEl.innerHTML = html;
}

// 设置留言标签筛选
function setMsgTag(tag) {
  msgBoardState.tag = tag;
  msgBoardState.page = 1; // 切换标签重置到第一页
  renderMessages();
}

// 更新分页UI
function updateMsgPagination() {
  const paginationEl = $('msgPagination');
  const prevBtn = $('msgPrevBtn');
  const nextBtn = $('msgNextBtn');
  const pageInfo = $('msgPageInfo');

  if (!paginationEl || !prevBtn || !nextBtn || !pageInfo) return;

  const totalPages = Math.ceil(msgBoardState.total / msgBoardState.limit) || 1;

  if (msgBoardState.total <= msgBoardState.limit) {
    paginationEl.style.display = 'none';
    return;
  }

  paginationEl.style.display = 'flex';
  pageInfo.textContent = `${msgBoardState.page} / ${totalPages}`;
  prevBtn.disabled = msgBoardState.page <= 1;
  nextBtn.disabled = msgBoardState.page >= totalPages;
}

// 切换留言页码
function changeMsgPage(delta) {
  const totalPages = Math.ceil(msgBoardState.total / msgBoardState.limit) || 1;
  const newPage = msgBoardState.page + delta;
  if (newPage < 1 || newPage > totalPages) return;
  msgBoardState.page = newPage;
  renderMessages();
}

function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function postMessage() {
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text && !msgImageData) {
    input.focus();
    return;
  }

  // 登录检查
  if (!_currentUser) {
    showToast('请先登录后再留言', 'error');
    setTimeout(() => { window.location.href = '/login.html?redirect=/'; }, 1500);
    return;
  }

  // 获取当前艺人信息
  const artistName = $('artistName').value.trim();
  const concertSelect = $('concertSelect') ? $('concertSelect').value : '';

  // 获取用户选择的标签
  let selectedTag = '';
  const tagShiPai = $('tagShiPai');
  const tagShaiTu = $('tagShaiTu');
  const tagDaZi = $('tagDaZi');
  if (tagShiPai && tagShiPai.checked) selectedTag = tagShiPai.value;
  else if (tagShaiTu && tagShaiTu.checked) selectedTag = tagShaiTu.value;
  else if (tagDaZi && tagDaZi.checked) selectedTag = tagDaZi.value;

  // 已登录用户通过API发布
  const content = text || '(仅图片)';
  Auth.apiPost('/api/messages', {
    content,
    sticker: msgImageData || '',
    artist: artistName || '',
    concert_id: concertSelect || null,
    tag: selectedTag
  }).then(data => {
    if (data && data.code === 0) {
      input.value = '';
      input.style.height = 'auto';
      removeMsgImage();

      if (tagShiPai) tagShiPai.checked = false;
      if (tagShaiTu) tagShaiTu.checked = false;
      if (tagDaZi) tagDaZi.checked = false;
      renderMessages();
      showCopyToast('留言成功~');
    } else {
      showToast(data?.message || '留言失败', 'error');
    }

}

async function toggleLike(id) {
  // 登录检查
  if (!_currentUser) {
    showToast('请先登录后再点赞', 'error');
    setTimeout(() => { window.location.href = '/login.html?redirect=/'; }, 1500);
    return;
  }

  // 通过API点赞/取消点赞
  const data = await Auth.apiPost('/api/messages/' + id + '/like', {});
  if (data && data.code === 0) {

    const delData = await Auth.apiDelete('/api/messages/' + id + '/like');

function toggleReply(id) {
  const el = $('replyInput_' + id);
  if (el.classList.contains('show')) {
    el.classList.remove('show');
  } else {
    document.querySelectorAll('.msg-reply-input.show').forEach(e => e.classList.remove('show'));
    el.classList.add('show');
    setTimeout(() => $('replyText_' + id).focus(), 50);
  }
}

function postReply(id) {
  const input = $('replyText_' + id);
  const text = input.value.trim();
  if (!text) return;

  // 登录检查
  if (!_currentUser) {
    showToast('请先登录后再回复', 'error');
    setTimeout(() => { window.location.href = '/login.html?redirect=/'; }, 1500);
    return;
  }

  // 通过API回复
  Auth.apiPost('/api/messages', { content: text, parent_id: id }).then(data => {
    if (data && data.code === 0) {
      input.value = '';
      $('replyInput_' + id).classList.remove('show');
      renderMessages();
    } else {
      showToast(data?.message || '回复失败', 'error');
    }
  });
}

function handleMsgImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 2 * 1024 * 1024) {
    showCopyToast('图片不能超过2MB');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    msgImageData = e.target.result;
    $('msgImgPreviewImg').src = msgImageData;
    $('msgImgPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function removeMsgImage() {
  msgImageData = null;
  $('msgImgPreview').style.display = 'none';
  $('msgImgFile').value = '';
}

function setupTabs() {

// ====== 热门演唱会资讯栏 ======
function getTagClass(tag) {
  if (tag === '火爆') return 'tag-fire';
  if (tag === '热卖中') return 'tag-hot';
  if (tag === '即将开唱') return 'tag-soon';
  if (tag === '预售中') return 'tag-pre';
  if (tag === '已开唱') return 'tag-done';
  return 'tag-hot';
}

function formatConcertDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  return `${d.getMonth() + 1}月${d.getDate()}日`;
}

let tickerData = [];
let tickerIndex = 0;
let tickerTimer = null;

async function loadHotConcerts() {
  const body = $('concertTickerBody');
  try {
    // 登录后用带 token 的请求，以便后端返回 is_favorited 收藏状态
    const data = Auth.isLoggedIn()
      ? await Auth.apiGet('/api/hot-concerts')
      : await apiGet('/api/hot-concerts');
    if (data.code !== 0 || !data.data || data.data.length === 0) {
      body.innerHTML = '<div class="concert-ticker-loading">暂无演唱会资讯</div>';
      return;
    }
    // 过滤掉"已开唱"
    tickerData = data.data.filter(c => c.tag !== '已开唱');
    if (tickerData.length === 0) {
      body.innerHTML = '<div class="concert-ticker-loading">暂无演唱会资讯</div>';
      return;
    }
    // 随机起始位置
    tickerIndex = Math.floor(Math.random() * tickerData.length);
    renderTickerItem();
    // 启动轮播
    startTickerRotation();
  } catch {
    body.innerHTML = '<div class="concert-ticker-loading">资讯获取失败，请刷新重试</div>';
  }
}

function renderTickerItem() {
  const body = $('concertTickerBody');
  const c = tickerData[tickerIndex];
  const tagCls = getTagClass(c.tag);
  // 收藏按钮：未登录不显示，登录后根据 is_favorited 显示实心/空心心形
  const favBtn = Auth.isLoggedIn()
    ? `<span class="ci-fav ${c.is_favorited ? 'is-fav' : ''}" onclick="event.stopPropagation(); toggleFavorite(${c.id}, this)" title="${c.is_favorited ? '取消收藏' : '收藏演唱会'}">${c.is_favorited ? '♥' : '♡'}</span>`
    : '';
  body.innerHTML = `<div class="concert-ticker-item" data-concert='${JSON.stringify(c).replace(/'/g, "&#39;")}'>
    <span class="ci-tag ${tagCls}">${c.tag || ''}</span>
    <span class="ci-artist">${c.artist || ''}</span>
    <span class="ci-tour">「${c.tour_name || c.tour || ''}」</span>
    <span class="ci-city">${c.city || ''}</span>
    <span class="ci-venue">${c.venue || ''}</span>
    <span class="ci-date">${formatConcertDate(c.concert_date || c.date)}</span>
    ${favBtn}
  </div>`;
  // 绑定点击
  const item = body.querySelector('.concert-ticker-item');
  if (item) {
    item.addEventListener('click', () => {
      const concert = JSON.parse(item.dataset.concert);
      fillConcertForm(concert);
    });
  }
}

// 切换演唱会收藏状态
async function toggleFavorite(concertId, el) {
  console.log('toggleFavorite 被调用', { concertId, el });

  // 检查是否登录
  if (!Auth.isLoggedIn()) {
    showTickerToast('请先登录后再收藏');
    setTimeout(() => {
      window.location.href = '/login.html?redirect=/';
    }, 1500);
    return;
  }

  const isFav = el.classList.contains('is-fav');
  console.log('当前收藏状态:', isFav);

  if (isFav) {
    // 取消收藏
    const data = await Auth.apiDelete('/api/favorites/' + concertId);
    console.log('取消收藏响应:', data);
    if (data && data.code === 0) {
      el.classList.remove('is-fav');
      el.textContent = '♡';
      el.title = '收藏演唱会';
      // 同步更新本地缓存
      const c = tickerData.find(x => x.id === concertId);
      if (c) c.is_favorited = false;
      showTickerToast('已取消收藏');
    } else {
      showTickerToast(data?.message || '取消收藏失败');
    }
  } else {
    // 添加收藏
    const data = await Auth.apiPost('/api/favorites', { concert_id: concertId });
    console.log('添加收藏响应:', data);
    if (data && data.code === 0) {
      el.classList.add('is-fav');
      el.textContent = '♥';
      el.title = '取消收藏';
      const c = tickerData.find(x => x.id === concertId);
      if (c) c.is_favorited = true;
      showTickerToast('已加入收藏');
    } else {
      showTickerToast(data?.message || '收藏失败');
    }
  }
}

// 确保函数在全局作用域可访问
window.toggleFavorite = toggleFavorite;

function startTickerRotation() {
  if (tickerTimer) clearInterval(tickerTimer);
  tickerTimer = setInterval(() => {
    const body = $('concertTickerBody');
    const item = body.querySelector('.concert-ticker-item');
    if (item) {
      item.style.opacity = '0';
      setTimeout(() => {
        tickerIndex = (tickerIndex + 1) % tickerData.length;
        renderTickerItem();
        const newItem = body.querySelector('.concert-ticker-item');
        if (newItem) {
          newItem.style.opacity = '0';
          requestAnimationFrame(() => {
            newItem.style.opacity = '1';
          });
        }
      }, 400);
    }
  }, 4000);
}

function fillConcertForm(concert) {
  // 填入艺人名称
  const artistInput = $('artistName');
  const artistText = `${concert.artist || ''}${concert.tour_name || concert.tour || ''}巡回演唱会${concert.city || ''}站`;
  artistInput.value = artistText;
  // 触发主题切换
  applyTheme(artistText);
  syncCustomThemeInputs(artistText);
  // 直接赋值 .value 不会触发 input 事件，需手动刷新留言板，
  // 否则切换演出后仍会展示上一个艺人的留言
  renderMessages();

  // 填入场馆
  const venueInput = $('venueInput');
  venueInput.value = concert.venue;
  state.venueInfo = null; // 清除已选状态，让 generateItinerary 重新搜索

  // 填入日期
  $('concertDate').value = concert.concert_date || concert.date || '';

  // 视觉反馈：高亮闪烁表单
  [artistInput, venueInput, $('concertDate')].forEach(el => {
    el.style.transition = 'background 0.3s';
    el.style.background = 'rgba(124, 58, 237, 0.15)';
    setTimeout(() => { el.style.background = ''; }, 800);
  });

  // 滚动到表单区域（手机端）
  if (window.innerWidth < 900) {
    artistInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // 显示提示
  showTickerToast(`已填入：${concert.artist || ''} ${concert.city || ''}站 ${formatConcertDate(concert.concert_date || concert.date)}`);
}

function showTickerToast(msg) {
  let toast = $('tickerToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'tickerToast';
    toast.style.cssText = `
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,50,0.92); color: #fff;
      padding: 10px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; white-space: nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(10px)';
  }, 2500);
}

function init() {
  // 检测是否通过 file:// 协议打开（会导致 API 请求失败）
  if (location.protocol === 'file:') {
    showError('请通过 http://localhost:3000 访问本页面，不要直接打开 HTML 文件，否则所有功能将无法使用。');
    return;
  }

  // 设置默认日期为明天
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  $('concertDate').value = tomorrow.toISOString().split('T')[0];
  $('concertDate').min = new Date().toISOString().split('T')[0];

  // 绑定事件
  $('generateBtn').addEventListener('click', generateItinerary);
  $('refreshLocation').addEventListener('click', detectLocation);
  setupVenueSearch();
  setupTabs();

  // 出发城市手动修改时更新状态
  $('departureCity').addEventListener('input', () => {
    state.userCity = $('departureCity').value.trim();
  });

  // 演出信息变更时清除行程
  ['artistName', 'venueInput', 'concertDate'].forEach(id => {
    $(id).addEventListener('input', () => {
      clearItinerary();
    });
    $(id).addEventListener('change', () => {
      clearItinerary();
    });
  });

  // 艺人名输入时实时切换页面主题色
  $('artistName').addEventListener('input', () => {
    const name = $('artistName').value.trim();
    applyTheme(name);
    syncCustomThemeInputs(name);
    // 刷新留言板内容
    renderMessages();
  });

  // ====== 自定义应援设置 ======
  // 折叠/展开
  $('customThemeToggle').addEventListener('click', () => {
    $('customThemeSection').classList.toggle('open');
    // 首次展开时同步当前主题色到选择器
    if ($('customThemeSection').classList.contains('open')) {
      syncCustomThemeInputs($('artistName').value.trim());
    }
  });

  // 应援色选择器
  $('customColorPicker').addEventListener('input', (e) => {
    const color = e.target.value.toUpperCase();
    $('customColorHex').value = color;
    state.customTheme.color = color;
    applyTheme($('artistName').value.trim());
  });

  // Hex 文本输入
  $('customColorHex').addEventListener('input', (e) => {
    let val = e.target.value.trim().toUpperCase();
    if (!val.startsWith('#')) val = '#' + val;
    if (/^#[0-9A-F]{6}$/.test(val)) {
      $('customColorPicker').value = val;
      state.customTheme.color = val;
      applyTheme($('artistName').value.trim());
    }
  });

  // 粉丝名称
  $('customFanName').addEventListener('input', (e) => {
    state.customTheme.fanName = e.target.value.trim();
    applyTheme($('artistName').value.trim());
  });

  // 应援口号
  $('customSlogan').addEventListener('input', (e) => {
    state.customTheme.slogan = e.target.value.trim();
    applyTheme($('artistName').value.trim());
  });

  // 恢复默认
  $('customResetBtn').addEventListener('click', () => {
    state.customTheme = { color: null, fanName: null, slogan: null };
    syncCustomThemeInputs($('artistName').value.trim());
    applyTheme($('artistName').value.trim());
  });

  // 场馆输入框修改时清除已选状态
  $('venueInput').addEventListener('input', () => {
    if (state.venueInfo && state.venueInfo.name !== $('venueInput').value) {
      state.venueInfo = null;
    }
  });

  // 开始定位
  detectLocation();

  // 初始化自定义主题 UI
  syncCustomThemeInputs('');
  updateCustomThemeUI();

  // 加载热门演唱会资讯
  loadHotConcerts();

  // 从「我的收藏」跳转过来时，自动填入收藏的演唱会信息
  const pendingConcert = sessionStorage.getItem('pendingConcert');
  if (pendingConcert) {
    sessionStorage.removeItem('pendingConcert');
    try {
      const concert = JSON.parse(pendingConcert);
      // 等表单元素就绪后填入
      setTimeout(() => fillConcertForm(concert), 100);
    } catch {}
  }

  // ====== 留言板初始化 ======
  renderMessages(); // async, 不阻塞
  // textarea 自适应高度
  $('msgInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
  // Enter 发送
  $('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      postMessage();
    }
  });
  // 图片上传
  $('msgImgFile').addEventListener('change', function() {
    if (this.files && this.files[0]) handleMsgImage(this.files[0]);
  });

}

// 启动
init();
