<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 管理后台</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <script src="/js/common.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    let stats = {};

    async function init() {
      const user = await AdminUtils.initAdminPage('仪表盘', 'dashboard');
      if (!user) return;

      await loadStats();
      renderDashboard();
    }

    async function loadStats() {
      // 加载统计数据
      const [usersRes, concertsRes, itinerariesRes, ordersRes, messagesRes] = await Promise.all([
        AdminUtils.apiRequest('/api/auth/stats'),
        AdminUtils.apiRequest('/api/concerts?limit=1'),
        AdminUtils.apiRequest('/api/itineraries?limit=1'),
        AdminUtils.apiRequest('/api/orders?limit=1'),
        AdminUtils.apiRequest('/api/messages?limit=1')
      ]);

      stats = {
        users: usersRes?.data?.total || 0,
        concerts: concertsRes?.data?.pagination?.total || 0,
        itineraries: itinerariesRes?.data?.pagination?.total || 0,
        orders: ordersRes?.data?.pagination?.total || 0,
        messages: messagesRes?.data?.pagination?.total || 0
      };
    }

    function renderDashboard() {
      const content = document.getElementById('adminContent');

      content.innerHTML = `
        <!-- 统计卡片 -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px;">
          ${renderStatCard('👥', '用户总数', stats.users, '/admin-users.html')}
          ${renderStatCard('🎫', '演唱会', stats.concerts, '/admin-concerts.html')}
          ${renderStatCard('✈️', '行程', stats.itineraries, null)}
          ${renderStatCard('📦', '订单', stats.orders, '/admin-orders.html')}
          ${renderStatCard('💬', '留言', stats.messages, '/admin-messages.html')}
        </div>

        <!-- 快捷操作 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <h3 class="admin-card-title">快捷操作</h3>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <button class="admin-btn admin-btn-primary" onclick="location.href='/admin-concerts.html'">
              🎫 添加演唱会
            </button>
            <button class="admin-btn admin-btn-success" onclick="location.href='/admin-cms.html'">
              📝 发布内容
            </button>
            <button class="admin-btn admin-btn-default" onclick="location.href='/admin-settings.html'">
              ⚙️ 网站配置
            </button>
            <button class="admin-btn admin-btn-default" onclick="location.href='/admin-notifications.html'">
              🔔 发送通知
            </button>
          </div>
        </div>

        <!-- 系统信息 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <h3 class="admin-card-title">系统信息</h3>
          </div>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
            <div>
              <div style="font-size: 13px; color: var(--admin-text-light); margin-bottom: 8px;">数据库</div>
              <div style="font-weight: 600;">SQLite</div>
            </div>
            <div>
              <div style="font-size: 13px; color: var(--admin-text-light); margin-bottom: 8px;">版本</div>
              <div style="font-weight: 600;">v2.0</div>
            </div>
            <div>
              <div style="font-size: 13px; color: var(--admin-text-light); margin-bottom: 8px;">表数量</div>
              <div style="font-weight: 600;">19 张</div>
            </div>
            <div>
              <div style="font-size: 13px; color: var(--admin-text-light); margin-bottom: 8px;">运行状态</div>
              <div style="font-weight: 600; color: var(--admin-success);">● 正常运行</div>
            </div>
          </div>
        </div>

        <!-- 最近活动 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <h3 class="admin-card-title">最近活动</h3>
            <a href="/admin-logs.html" style="color: var(--admin-primary); text-decoration: none; font-size: 14px;">查看全部 →</a>
          </div>
          <div id="recentActivity">
            ${AdminUtils.renderLoading()}
          </div>
        </div>
      `;

      loadRecentActivity();
    }

    function renderStatCard(icon, label, value, link) {
      const card = `
        <div class="admin-card" style="text-align: center; padding: 30px 20px; ${link ? 'cursor: pointer;' : ''}" ${link ? `onclick="location.href='${link}'"` : ''}>
          <div style="font-size: 36px; margin-bottom: 10px;">${icon}</div>
          <div style="font-size: 13px; color: var(--admin-text-light); margin-bottom: 8px;">${label}</div>
          <div style="font-size: 28px; font-weight: 700; color: var(--admin-primary);">${value}</div>
        </div>
      `;
      return card;
    }

    async function loadRecentActivity() {
      // 这里可以加载操作日志
      const activityHTML = `
        <div style="color: var(--admin-text-light); text-align: center; padding: 20px;">
          暂无最近活动记录
        </div>
      `;
      document.getElementById('recentActivity').innerHTML = activityHTML;
    }

    // 页面加载时初始化
    init();
  </script>
</body>
</html>
