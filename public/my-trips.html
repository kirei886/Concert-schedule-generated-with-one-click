<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的行程 - 演唱会行程</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .page-container { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
    .page-title { font-size: 24px; font-weight: 800; margin-bottom: 24px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .trip-list { display: flex; flex-direction: column; gap: 16px; }
    .trip-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px;
      transition: all 0.3s ease; cursor: pointer; border: 1.5px solid transparent; }
    .trip-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary-light); }
    .trip-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .trip-title { font-size: 16px; font-weight: 600; color: var(--text-main); }
    .trip-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--text-sub); }
    .trip-meta-item { display: flex; align-items: center; gap: 4px; }
    .trip-actions { display: flex; gap: 8px; margin-top: 12px; }
    .trip-badge { padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-public { background: #dbeafe; color: #2563eb; }
    .badge-private { background: #f3f4f6; color: #9ca3af; }
    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 16px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-state a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .share-link { background: #f0eef5; border-radius: 8px; padding: 8px 12px; font-size: 12px;
      color: var(--primary); margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="page-container">
    <h1 class="page-title">我的行程</h1>
    <div id="tripList" class="trip-list">
      <div class="empty-state">加载中...</div>
    </div>
  </div>
  <script src="/js/common.js"></script>
  <script>
    let currentUser = null;

    (async function() {
      currentUser = await initPage();
      if (!currentUser) {
        window.location.href = '/login.html?redirect=/my-trips.html';
        return;
      }
      loadTrips();
    })();

    async function loadTrips() {
      const data = await Auth.apiGet('/api/itineraries?page=1&limit=50');
      const container = document.getElementById('tripList');

      if (!data || data.code !== 0 || !data.data.itineraries || !data.data.itineraries.length) {
        container.innerHTML = `
          <div class="empty-state">
            <p style="font-size:16px;margin-bottom:8px;">还没有保存任何行程</p>
            <p>去<a href="/">行程生成器</a>创建你的第一个演唱会行程吧！</p>
          </div>
        `;
        return;
      }

      container.innerHTML = data.data.itineraries.map(trip => `
        <div class="trip-card" onclick="viewTrip(${trip.id})">
          <div class="trip-header">
            <div>
              <div class="trip-title">${escapeHtml(trip.title || '未命名行程')}</div>
              ${trip.artist ? `<div style="font-size:13px;color:var(--text-sub);margin-top:4px;">${escapeHtml(trip.artist)} - ${escapeHtml(trip.city || '')}</div>` : ''}
            </div>
            <span class="trip-badge ${trip.is_public ? 'badge-public' : 'badge-private'}">
              ${trip.is_public ? '已公开' : '私有'}
            </span>
          </div>
          <div class="trip-meta">
            ${trip.depart_city ? `<div class="trip-meta-item">${escapeHtml(trip.depart_city)} -> ${escapeHtml(trip.dest_city || '')}</div>` : ''}
            ${trip.travel_date ? `<div class="trip-meta-item">${formatDate(trip.travel_date)}</div>` : ''}
            ${trip.total_budget ? `<div class="trip-meta-item">预算 ¥${trip.total_budget}</div>` : ''}
            ${trip.concert_date ? `<div class="trip-meta-item">演唱会 ${formatDate(trip.concert_date)}</div>` : ''}
          </div>
          <div class="trip-actions" onclick="event.stopPropagation()">
            <button class="btn-outline btn-sm" onclick="viewTrip(${trip.id})">查看</button>
            <button class="btn-outline btn-sm" onclick="editTrip(${trip.id})">编辑</button>
            ${trip.is_public ? `<button class="btn-outline btn-sm" onclick="copyShare('${trip.share_code}')">复制分享链接</button>` : `<button class="btn-outline btn-sm" onclick="shareTrip(${trip.id})">分享</button>`}
            <button class="btn-outline btn-sm" style="color:#ef4444;border-color:#fecaca;" onclick="deleteTrip(${trip.id})">删除</button>
          </div>
        </div>
      `).join('');
    }

    function viewTrip(id) {
      window.location.href = `/trip-detail.html?id=${id}`;
    }

    function editTrip(id) {
      window.location.href = `/edit-trip.html?id=${id}`;
    }

    async function shareTrip(id) {
      const data = await Auth.apiPost(`/api/itineraries/${id}/share`);
      if (data && data.code === 0) {
        showToast('分享链接已生成');
        loadTrips();
      }
    }

    function copyShare(code) {
      const url = `${location.origin}/trip-detail.html?share=${code}`;
      navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
    }

    async function deleteTrip(id) {
      if (!confirm('确定删除这个行程吗？')) return;
      const data = await Auth.apiDelete(`/api/itineraries/${id}`);
      if (data && data.code === 0) {
        showToast('已删除', 'success');
        loadTrips();
      }
    }
  </script>
</body>
</html>
