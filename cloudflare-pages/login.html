<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 演唱会行程</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .auth-container { max-width: 400px; margin: 60px auto; padding: 0 20px; }
    .auth-card { background: white; border-radius: 20px; box-shadow: var(--shadow); padding: 40px 32px; }
    .auth-title { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-subtitle { text-align: center; font-size: 13px; color: var(--text-sub); margin-bottom: 32px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-sub); }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .btn-submit { width: 100%; padding: 14px; font-size: 15px; margin-top: 8px; }
    .error-msg { color: var(--error); font-size: 13px; margin-top: 8px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">欢迎回来</h1>
      <p class="auth-subtitle">登录后保存你的演唱会行程</p>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名或邮箱</label>
          <input type="text" class="form-input" id="account" required placeholder="输入用户名或邮箱" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" required placeholder="输入密码" autocomplete="current-password">
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <button type="submit" class="btn-primary btn-submit">登录</button>
      </form>
      <div class="auth-footer">
        还没有账号？<a href="/register.html">立即注册</a>
      </div>
    </div>
  </div>
  <script src="/js/api-config.js"></script>
  <script src="/js/common.js"></script>
  <script>
    (async function() {
      const user = await Auth.getUser();
      if (user) {
        const redirect = new URLSearchParams(location.search).get('redirect') || '/';
        window.location.href = redirect;
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const account = document.getElementById('account').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      try {
        // 使用 Auth.apiPost 而不是直接 fetch
        const data = await Auth.apiPost('/api/auth/login', { account, password });
        if (data && data.code === 0) {
          Auth.setToken(data.data.token);
          const redirect = new URLSearchParams(location.search).get('redirect') || '/';
          window.location.href = redirect;
        } else {
          errorEl.textContent = data?.message || '登录失败';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
